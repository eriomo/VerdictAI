// ── Auth Context ───────────────────────────────────────────────────────────────
const AuthContext = createContext(null);
function AuthProvider({children}) {
  const [user, setUser] = useState(null);
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({data:{session}}) => {
      setSession(session); setUser(session?.user ?? null); setLoading(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_event, session) => {
      setSession(session); setUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const signUp = async (email, password, meta) => {
    const {error} = await sb.auth.signUp({email, password, options:{data:meta}});
    return error;
  };
  const signIn = async (email, password) => {
    const {error} = await sb.auth.signInWithPassword({email, password});
    return error;
  };
  const signOut = async () => { await sb.auth.signOut(); };
  const getToken = async () => (await sb.auth.getSession()).data.session?.access_token;

  return React.createElement(AuthContext.Provider, {value:{user,session,loading,signUp,signIn,signOut,getToken}}, children);
}
const useAuth = () => useContext(AuthContext);

// ── API helper ─────────────────────────────────────────────────────────────────
async function api(path, opts={}) {
  const {data:{session}} = await sb.auth.getSession();
  const token = session?.access_token;
  const res = await fetch(path, {
    ...opts,
    headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${token}`, ...(opts.headers||{})},
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) {
    const e = await res.json().catch(()=>({error:'Request failed'}));
    throw new Error(e.message || e.error || 'Request failed');
  }
  return res.json();
}

// ── AI Streaming ───────────────────────────────────────────────────────────────
async function groqStream(sys, user, cb, retries=0) {
  try {
    const {data:{session}} = await sb.auth.getSession();
    const token = session?.access_token;
    const res = await fetch('/api/ai', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body:JSON.stringify({system:sys,user})
    });

    if (res.status === 403) {
      const e = await res.json();
      if (e.error === 'FREE_LIMIT_REACHED') throw new Error('FREE_LIMIT_REACHED');
      throw new Error(e.message || 'Access denied');
    }
    if (res.status === 429 && retries < 3) {
      cb('[Verdict AI is busy — retrying in a moment...]\n\n');
      await new Promise(r=>setTimeout(r,5000));
      return groqStream(sys, user, cb, retries+1);
    }
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error||`Error ${res.status}`); }

    const reader=res.body.getReader(); const dec=new TextDecoder(); let full='';
    while(true) {
      const {done,value}=await reader.read(); if(done)break;
      for(const line of dec.decode(value).split('\n')) {
        if(!line.startsWith('data: '))continue;
        const d=line.slice(6); if(d==='[DONE]')continue;
        try{const delta=JSON.parse(d).choices[0]?.delta?.content||'';full+=delta;cb(full);}catch{}
      }
    }
    return full;
  } catch(err) {
    if(retries<2 && err.message.includes('fetch')) {
      await new Promise(r=>setTimeout(r,3000));
      return groqStream(sys,user,cb,retries+1);
    }
    throw err;
  }
}

// ── PDF extraction ─────────────────────────────────────────────────────────────
async function extractFromFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext==='pdf') {
    return new Promise((resolve,reject)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try {
          pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          const pdf=await pdfjsLib.getDocument({data:e.target.result}).promise;
          let text='';
          for(let i=1;i<=Math.min(pdf.numPages,50);i++){
            const page=await pdf.getPage(i);
            const c=await page.getTextContent();
            text+=c.items.map(x=>x.str).join(' ')+'\n\n';
          }
          resolve(text.trim());
        }catch(err){reject(err);}
      };
      r.readAsArrayBuffer(file);
    });
  }
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>resolve(e.target.result);
    r.onerror=reject;
    r.readAsText(file);
  });
}

// ── Export ─────────────────────────────────────────────────────────────────────
function exportPDF(text, filename='verdict-ai') {
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const m=20, pw=doc.internal.pageSize.getWidth()-m*2, lh=7;
  doc.setFillColor(12,26,46); doc.rect(0,0,doc.internal.pageSize.getWidth(),20,'F');
  doc.setTextColor(200,164,94); doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text('VERDICT AI',m,13);
  doc.setTextColor(240,237,230); doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('From documents to decisions.',80,13);
  let y=30;
  doc.setTextColor(30,30,30); doc.setFontSize(10);
  const lines=doc.splitTextToSize(text,pw);
  lines.forEach(line=>{
    if(y>doc.internal.pageSize.getHeight()-m){doc.addPage();y=m;}
    if(/^[A-Z\s]+:/.test(line.trim())){doc.setFont('helvetica','bold');doc.setTextColor(12,26,46);}
    else{doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);}
    doc.text(line,m,y); y+=lh;
  });
  const pages=doc.internal.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i); doc.setFontSize(8); doc.setTextColor(150);
    doc.text(`Verdict AI — Page ${i} of ${pages}`,m,doc.internal.pageSize.getHeight()-10);
  }
  doc.save(`${filename}.pdf`);
}

  const {user,loading:authLoading}=useAuth();
  const [page,setPage]=useState('dashboard');
  const [dark,setDark]=useState(true);
  const [sideOpen,setSideOpen]=useState(false);
  const [docs,setDocs]=useState([]);
  const [cases,setCases]=useState([]);
  const [profile,setProfile]=useState(null);
  const [dataLoading,setDataLoading]=useState(false);
  const t=theme(dark);

  // Load cloud data when user logs in
  useEffect(()=>{
    if(user){loadAll();}
  },[user]);

  const loadAll=async()=>{
    setDataLoading(true);
    try{
      const [d,c,p]=await Promise.all([
        api('/api/documents').catch(()=>[]),
        api('/api/cases').catch(()=>[]),
        api('/api/profile').catch(()=>null),
      ]);
      setDocs(Array.isArray(d)?d:[]);
      setCases(Array.isArray(c)?c:[]);
      setProfile(p);
    }catch(e){console.log('Load error:',e.message);}
    setDataLoading(false);
  };

  const saveDoc=async doc=>{
    try{const d=await api('/api/documents',{method:'POST',body:doc});setDocs(prev=>[d,...prev]);}
    catch(e){console.log('Save doc error:',e.message);}
  };

  const deleteDoc=async id=>{
    await api(`/api/documents/${id}`,{method:'DELETE'});
    setDocs(prev=>prev.filter(d=>d.id!==id));
  };

  const addCase=async caseData=>{
    const c=await api('/api/cases',{method:'POST',body:caseData});
    setCases(prev=>[c,...prev]);
  };

  const updateCase=async(id,updates)=>{
    const c=await api(`/api/cases/${id}`,{method:'PATCH',body:updates});
    setCases(prev=>prev.map(x=>x.id===id?c:x));
  };

  const deleteCase=async id=>{
    await api(`/api/cases/${id}`,{method:'DELETE'});
    setCases(prev=>prev.filter(c=>c.id!==id));
  };

  const updateProfile=async updates=>{
    const p=await api('/api/profile',{method:'PATCH',body:updates});
    setProfile(p);
  };

  const go=id=>{setPage(id);setSideOpen(false);};

  if(authLoading)return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#07101c',color:GOLD,fontFamily:"'Playfair Display',serif",fontSize:18}},'Loading Verdict AI...');

  if(!user)return React.createElement(AuthPage,{t:theme(true)});

  const renderPage=()=>{
    if(AI_PAGES[page])return React.createElement(AIPage,{cfg:AI_PAGES[page],t,onNavigate:go});
    switch(page){
      case 'dashboard': return React.createElement(Dashboard,{go,t,docCount:docs.length,caseCount:cases.length,profile});
      case 'reader': return React.createElement(ReaderPage,{onSave:saveDoc,t,onNavigate:go});
      case 'qa': return React.createElement(QAPage,{t,onNavigate:go});
      case 'draft': return React.createElement(DraftPage,{t,onNavigate:go});
      case 'jurisdiction': return React.createElement(JurisdictionPage,{t,onNavigate:go});
      case 'nigeriancases': return React.createElement(NigerianCasesPage,{t,onNavigate:go});
      case 'primsol': return React.createElement(PrimsolPage,{t});
      case 'vault': return React.createElement(VaultPage,{docs,onDelete:deleteDoc,onRefresh:loadAll,t});
      case 'cases': return React.createElement(CasesPage,{cases,onAdd:addCase,onUpdate:updateCase,onDelete:deleteCase,t});
      case 'profile': return React.createElement(ProfilePage,{profile,onUpdate:updateProfile,t});
      case 'upgrade': return React.createElement(UpgradePage,{t});
      default: return React.createElement(Dashboard,{go,t,docCount:docs.length,caseCount:cases.length,profile});
    }
  };

  const pageTitle=AI_PAGES[page]?.title||{dashboard:'Dashboard',reader:'Document Analysis',qa:'Legal Q&A',draft:'Draft Documents',jurisdiction:'Jurisdiction Translator',nigeriancases:'Nigerian Case Law',primsol:'PrimsCol Database',vault:'Document Vault',cases:'Case Workspaces',profile:'My Profile',upgrade:'Upgrade Plan'}[page]||'Verdict AI';

  return React.createElement(SessionProvider,null,
    React.createElement('div',{style:{display:'flex',height:'100vh',overflow:'hidden',background:t.bg,color:t.text,fontFamily:"'DM Sans',sans-serif",transition:'background 0.3s,color 0.3s',position:'relative'}},
      React.createElement('style',null,`

        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .fade{animation:fadeIn 0.3s ease forwards}
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:rgba(200,164,94,0.25);border-radius:10px}
        select option{background:#0c1a2e;color:#F0EDE6}
        @media(max-width:768px){.two-col{grid-template-columns:1fr!important}.stat-grid{grid-template-columns:1fr 1fr!important}.feat-grid{grid-template-columns:1fr 1fr!important}}

      `),

      sideOpen&&React.createElement('div',{onClick:()=>setSideOpen(false),style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:99}}),

      // SIDEBAR

        // Logo
        React.createElement('div',{style:{padding:'20px 18px 16px',borderBottom:`1px solid ${t.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}},
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10}},
            React.createElement('div',{style:{width:34,height:34,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:17,color:'#0D1B2E',boxShadow:'0 4px 14px rgba(200,164,94,0.3)'}},'V'),
            React.createElement('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:700,color:t.text}},'Verdict',React.createElement('span',{style:{color:GOLD}},'AI'))
          ),
          React.createElement('button',{onClick:()=>setSideOpen(false),style:{background:'none',border:'none',color:t.muted,cursor:'pointer',fontSize:22,padding:4,lineHeight:1}},'×')
        ),

        // User info
        React.createElement('div',{style:{padding:'12px 16px',borderBottom:`1px solid ${t.border}`,display:'flex',alignItems:'center',gap:10,cursor:'pointer'},onClick:()=>go('profile')},
          React.createElement('div',{style:{width:32,height:32,borderRadius:'50%',background:GOLD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'#0D1B2E',flexShrink:0}},(profile?.full_name||user.email||'U')[0].toUpperCase()),
          React.createElement('div',{style:{minWidth:0}},
            React.createElement('div',{style:{fontSize:13,fontWeight:600,color:t.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},profile?.full_name||'My Account'),
            React.createElement('div',{style:{fontSize:10,color:GOLD,fontWeight:700}},(profile?.tier||'FREE').toUpperCase()+' PLAN')
          )
        ),

        // Nav
        React.createElement('nav',{style:{flex:1,padding:'10px 8px'}},
          NAV.map(s=>React.createElement('div',{key:s.sec},
            React.createElement('div',{style:{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'1.5px',color:t.muted,padding:'10px 10px 4px'}},s.sec),
            s.items.map(item=>React.createElement('button',{key:item.id,onClick:()=>go(item.id),
              style:{display:'flex',alignItems:'center',gap:9,width:'100%',padding:'9px 10px',borderRadius:7,border:page===item.id?'1px solid rgba(200,164,94,0.22)':'1px solid transparent',background:page===item.id?'rgba(200,164,94,0.11)':'none',color:page===item.id?GOLD:t.dim,fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit',marginBottom:1,textAlign:'left',transition:'all 0.12s'}},
              React.createElement('span',{style:{fontSize:14}},item.icon),item.label

          profile?.tier==='free'&&React.createElement('button',{onClick:()=>go('upgrade'),style:{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',padding:'9px',marginBottom:8,borderRadius:7,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,border:'none',color:'#0D1B2E',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}},'⚡ Upgrade to Solo'),

            ),
            React.createElement('span',null,'🌙'),
            React.createElement('span',{style:{fontSize:11,color:t.muted}},dark?'Dark':'Light')

}

function App(){
  return React.createElement(AuthProvider,null,React.createElement(AppContent));
}
