// ── Persist Hook ──────────────────────────────────────────────────────────────
function usePersist(key, initial) {
  const [val, setVal] = useState(()=>{
    try { const s = localStorage.getItem('vd_p_'+key); if(s !== null) return JSON.parse(s); } catch {}
    return initial;
  });
  const valRef = useRef(val);
  valRef.current = val;
  const set = (updater) => {
    const next = typeof updater === 'function' ? updater(valRef.current) : updater;
    valRef.current = next;
    setVal(next);
    try { localStorage.setItem('vd_p_'+key, JSON.stringify(next)); } catch {}
  };
  return [val, set];
}
function clearPersist(...keys) {
  keys.forEach(k => { try { localStorage.removeItem('vd_p_'+k); } catch {} });
}
function clearAllPageStates() {
  try {
    Object.keys(localStorage).filter(k=>k.startsWith('vd_p_')).forEach(k=>localStorage.removeItem(k));
  } catch {}
}

// ── AI Streaming ──────────────────────────────────────────────────────────────
async function stream(sys,user,cb,retries=0){
  try{
    const {data:{session}} = await sb.auth.getSession();
    const res = await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${session?.access_token||""}`},body:JSON.stringify({system:sys,user})});
    if(res.status===403){const e=await res.json();throw new Error(e.error==="FREE_LIMIT_REACHED"?"FREE_LIMIT_REACHED":e.message||"Access denied");}
    if(res.status===429&&retries<3){cb("[Busy — retrying...]\n");await new Promise(r=>setTimeout(r,5000));return stream(sys,user,cb,retries+1);}
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`Error ${res.status}`);}
    const reader=res.body.getReader();const dec=new TextDecoder();let full="";
    while(true){
      const {done,value}=await reader.read();if(done)break;
      for(const line of dec.decode(value).split("\n")){
        if(!line.startsWith("data: "))continue;
        const d=line.slice(6);if(d==="[DONE]")continue;
        try{const delta=JSON.parse(d).choices[0]?.delta?.content||"";full+=delta;cb(full);}catch{}
      }
    }
    return full;
  }catch(err){
    if(retries<2&&err.message.includes("fetch")){await new Promise(r=>setTimeout(r,3000));return stream(sys,user,cb,retries+1);}
    throw err;
  }
}

// ── File extraction ───────────────────────────────────────────────────────────
async function extractFile(file){
  const ext=file.name.split(".").pop().toLowerCase();
  if(ext==="pdf"){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try{
          pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
          const pdf=await pdfjsLib.getDocument({data:e.target.result}).promise;
          let text="";
          for(let i=1;i<=Math.min(pdf.numPages,50);i++){
            const pg=await pdf.getPage(i);
            const ct=await pg.getTextContent();
            text+=ct.items.map(x=>x.str).join(" ")+"\n\n";
          }
          res(text.trim());
        }catch(err){rej(err);}
      };
      r.readAsArrayBuffer(file);
    });
  }
  if(ext==="docx"||ext==="doc"){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try{
          if(window.mammoth&&ext==="docx"){
            const result=await mammoth.extractRawText({arrayBuffer:e.target.result});
            if(result.value&&result.value.trim().length>20){res(result.value.trim());return;}
          }
          try{
            const uint8=new Uint8Array(e.target.result);
            const str=new TextDecoder("utf-8").decode(uint8);
            const xmlMatch=str.match(/word\/document\.xml[^<]*(<\?xml[^]*?<\/w:document>)/);
            if(xmlMatch){
              const xml=xmlMatch[1];
              const text=xml.replace(/<w:br[^>]*>/g,"\n").replace(/<w:p[\s>][^>]*>/g,"\n").replace(/<[^>]+>/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#x[0-9A-F]+;/gi,"").replace(/\s{3,}/g,"\n\n").trim();
              if(text.length>20){res(text);return;}
            }
          }catch{}
          const decoder=new TextDecoder("utf-8",{fatal:false});
          const text=decoder.decode(e.target.result);
          const clean=text.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f\x7f-\x9f]/g,"").replace(/[^\x20-\x7e\n\r\t\u00A0-\uFFFF]/g,"").replace(/\s{4,}/g,"\n\n").trim();
          if(clean.length>50)res(clean);
          else rej(new Error("Could not extract readable text from this file. Please copy and paste the text directly."));
        }catch(err){rej(err);}
      };
      r.readAsArrayBuffer(file);
    });
  }
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=rej;
    r.readAsText(file,"UTF-8");
  });
}

// ── Exports ───────────────────────────────────────────────────────────────────
function exportPDF(text,filename="verdict-ai"){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const m=20,pw=doc.internal.pageSize.getWidth()-m*2,lh=7;
  doc.setFillColor(12,26,46);doc.rect(0,0,doc.internal.pageSize.getWidth(),20,"F");
  doc.setTextColor(200,164,94);doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("VERDICT AI",m,13);
  doc.setTextColor(240,237,230);doc.setFontSize(9);doc.setFont("helvetica","normal");doc.text("From documents to decisions.",80,13);
  let y=30;doc.setTextColor(30,30,30);doc.setFontSize(10);
  doc.splitTextToSize(text,pw).forEach(line=>{
    if(y>doc.internal.pageSize.getHeight()-m){doc.addPage();y=m;}
    if(/^[A-Z\s]+:/.test(line.trim())){doc.setFont("helvetica","bold");doc.setTextColor(12,26,46);}
    else{doc.setFont("helvetica","normal");doc.setTextColor(30,30,30);}
    doc.text(line,m,y);y+=lh;
  });
  const pg=doc.internal.getNumberOfPages();
  for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150);doc.text(`Verdict AI — Page ${i} of ${pg}`,m,doc.internal.pageSize.getHeight()-10);}
  doc.save(`${filename}.pdf`);
}

async function exportDOCX(text,filename="verdict-ai"){
  try{
    const {Document,Packer,Paragraph,TextRun,BorderStyle}=window.docx;
    const lines=text.split("\n");
    const children=[
      new Paragraph({children:[new TextRun({text:"VERDICT AI",bold:true,size:28,color:"C8A45E",font:"Calibri"}),new TextRun({text:"   |   From documents to decisions.",size:18,color:"888888",font:"Calibri"})],spacing:{after:200},border:{bottom:{style:BorderStyle.SINGLE,size:6,color:"C8A45E"}}}),
      new Paragraph({text:"",spacing:{after:100}}),
    ];
    lines.forEach(line=>{
      const t=line.trim();
      if(!t){children.push(new Paragraph({text:"",spacing:{after:80}}));return;}
      if(/^[A-Z][A-Z\s]{3,}:/.test(t)){
        children.push(new Paragraph({children:[new TextRun({text:t,bold:true,size:22,color:"0A1628",font:"Calibri"})],spacing:{before:240,after:80},border:{bottom:{style:BorderStyle.SINGLE,size:3,color:"E0DAD0"}}}));
      } else {
        children.push(new Paragraph({children:[new TextRun({text:t,size:20,font:"Calibri",color:"1A1A2E"})],spacing:{after:80}}));
      }
    });
    children.push(new Paragraph({children:[new TextRun({text:`Generated by Verdict AI — ${new Date().toLocaleDateString()} — verdictai.onrender.com`,size:16,color:"888888",italics:true,font:"Calibri"})],border:{top:{style:BorderStyle.SINGLE,size:3,color:"E0DAD0"}},spacing:{before:300}}));
    const doc=new Document({creator:"Verdict AI",title:filename,sections:[{properties:{},children}]});
    const blob=await Packer.toBlob(doc);
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename+".docx";a.click();URL.revokeObjectURL(url);
  }catch(err){
    const b=new Blob([text],{type:"application/msword"});
    const url=URL.createObjectURL(b);
    const a=document.createElement("a");a.href=url;a.download=filename+".doc";a.click();
  }
}

  warroom:{id:"warroom",title:"Case War Room",desc:"Complete strategic intelligence — arguments, vulnerabilities, weighted risk, step-by-step litigation strategy.",lbl:"Case Details",ph:"Describe the case: parties, facts, legal issues, jurisdiction, desired outcome...",rows:12,sys:VOICE+"\n\nProduce a complete, elite-level Case War Room analysis. Every section must be substantive and precise.\n\nCASE OVERVIEW:\nIdentify the dispute, parties, what is at stake financially and legally, and the decisive legal question this case turns on.\n\nWINNING PROBABILITY SCORE:\nScore the overall position from 0-100%. Then break it down: Argument strength X/10. Evidence strength X/10. Legal clarity X/10. Procedural position X/10. Calculate the weighted final score and explain exactly what drives it up or down.\n\nSTRONGEST ARGUMENTS (RANKED 1-5):\nFor each argument: the precise legal basis, why it is persuasive, how to articulate it to a court, and what can defeat it.\n\nFATAL VULNERABILITIES:\nFor each weakness: what it is, why it is dangerous, and specifically how opposing counsel will exploit it. Rate each CRITICAL, HIGH, or MEDIUM.\n\nKILLER POINTS — WHAT WINS THIS CASE:\nThe two or three decisive factors that will determine the outcome. Be direct. These are the things the lawyer must win on.\n\nAPPLICABLE STATUTES AND LEGAL PRINCIPLES:\nAll relevant Nigerian statutes, sections, and doctrines by full name.\n\nOUTCOME SCENARIOS:\nStrong win scenario and what it delivers. Partial win scenario and what it delivers. Loss scenario and what it costs. Assign realistic probabilities to each.\n\nFINANCIAL EXPOSURE:\nRealistic range of what the client can recover or is liable for. Include litigation cost estimate.\n\nSTRATEGIC ROADMAP:\nStep-by-step litigation strategy from now to judgment, including interim applications, evidence gathering, and settlement windows.\n\nSETTLEMENT INTELLIGENCE:\nOptimal settlement range. Negotiation leverage points. Recommended opening and target positions."},
  opposing:{id:"opposing",title:"Opposing Counsel Simulator",desc:"The strongest counter-arguments your opponent will make — ranked by danger, with how to defeat each.",lbl:"Your Legal Argument",ph:"State your position, supporting facts, legal basis, authorities...",rows:12,sys:VOICE+"\n\nYou are the most dangerous opposing counsel the other side could hire. Dismantle this position completely.\n\nVULNERABILITY RATING:\nRate overall vulnerability 0-10 with a precise one-paragraph explanation of why.\n\nKILLER ARGUMENTS AGAINST YOU (RANKED BY DANGER):\nFor each argument: rate it CRITICAL, HIGH, or MEDIUM. State the precise legal or factual basis. Explain exactly how much damage it can do. Provide the specific counter-strategy to defeat it.\n\nFATAL GAPS IN YOUR CASE:\nFacts you have not proven. Legal elements you have not established. Procedural steps you have missed. Each gap with its consequence.\n\nWHAT THEY WILL SAY IN OPENING:\nDraft the three most devastating sentences opposing counsel will open with.\n\nCROSS-EXAMINATION TARGETS:\nWhich of your witnesses or documents are most vulnerable and exactly how they will be attacked.\n\nPRELIMINARY OBJECTIONS THEY WILL RAISE:\nEvery procedural or jurisdictional objection available to them, ranked by likelihood of success.\n\nHOW TO FORTIFY YOUR POSITION:\nSpecific, actionable steps to close each gap before the hearing."},
  strength:{id:"strength",title:"Strength Assessment",desc:"Weighted probability score 0-100% with full breakdown of every factor driving the outcome.",lbl:"Legal Position",ph:"Describe the claim or defence, facts, jurisdiction, applicable law...",rows:12,sys:VOICE+"\n\nConduct a rigorous, quantified legal strength assessment. Produce elite-level output.\n\nOVERALL STRENGTH SCORE:\nState the percentage. Then immediately explain in one paragraph what primarily drives this score.\n\nWEIGHTED FACTOR BREAKDOWN:\nScore each factor out of 10 with a full explanation of the score:\n1. Legal foundation strength\n2. Evidence quality and availability\n3. Contract or document clarity\n4. Burden of proof position\n5. Procedural compliance\n6. Opposing party's likely counter-strength\nDerive the final weighted probability from these scores.\n\nDECISIVE STRENGTHS:\nFor each strength: the specific legal or factual basis, why it matters, and how to deploy it.\n\nDECISIVE WEAKNESSES:\nFor each weakness: what it is, why it is dangerous, how the other side will exploit it, and specifically how to address it.\n\nKILLER POINTS — THE CASE HINGES ON:\nThe specific arguments or facts that will determine the outcome. Direct, no hedging.\n\nOUTCOME PROBABILITY MATRIX:\nStrong win: probability and what it delivers. Partial win: probability and what it delivers. Loss: probability and what it costs. Assign financial figures to each scenario.\n\nHOW TO PUSH THIS TO 80-90%:\nPrecise, numbered steps to strengthen the position. Each step must be specific and actionable."},
  briefscore:{id:"briefscore",title:"Brief-to-Win Score",desc:"Your brief scored on five dimensions before filing — with rewrites of the weakest sections.",lbl:"Legal Brief",ph:"Paste your complete legal brief here...",rows:14,sys:VOICE+"\n\nReview this legal brief as a senior litigation partner who will be presenting it to court tomorrow.\n\nOVERALL SCORE:\nOut of 100 with letter grade A through F. State whether this brief is ready to file.\n\nDIMENSION SCORES (each out of 20 with full explanation):\n1. ARGUMENT STRENGTH: Are the arguments legally sound, compelling, and ranked correctly?\n2. CITATION QUALITY: Are authorities properly applied? Flag anything that needs verification on PrimsCol.\n3. LOGICAL FLOW: Does the argument build correctly? Where does it lose the reader?\n4. PERSUASION AND PRECISION: Is the language sharp and court-grade? Where is it vague, generic, or weak?\n5. TECHNICAL ACCURACY: Procedural compliance, proper headings, correct relief formulation.\n\nKILLER POINTS IN THIS BRIEF:\nThe three strongest arguments — what makes them work.\n\nFATAL WEAKNESSES:\nEvery passage that could cause a judge to dismiss or discount the argument. Quote the specific lines.\n\nGRAMMAR AND PROFESSIONAL QUALITY AUDIT:\nFlag every sentence with grammar errors or unprofessional phrasing. Quote and correct each one.\n\nREWRITTEN SECTIONS:\nRewrite every weak or defective paragraph to court-ready standard.\n\nFILING RECOMMENDATION:\nShould this be filed as is, revised before filing, or substantially redrafted?"},
  explainer:{id:"explainer",title:"Client Explainer",desc:"Turn any legal analysis into a plain English client letter a non-lawyer will actually understand.",lbl:"Legal Text",ph:"Paste the document or analysis to explain to your client...",rows:12,sys:VOICE+"\n\nDraft a formal client letter in plain English. Every word must be clear.\n\nWHAT THIS DOCUMENT IS AND WHAT IT DOES:\nOne paragraph. No jargon. What it is, who it involves, what it does.\n\nWHAT THIS MEANS FOR YOU SPECIFICALLY:\nPractical consequences. What changes in their life or business. Concrete, not abstract.\n\nTHE THREE THINGS YOU MUST UNDERSTAND:\nThe most important points a non-lawyer cannot miss. Written simply.\n\nYOUR OBLIGATIONS AND DEADLINES:\nEvery obligation, when, and what happens if they do not comply.\n\nTHE RISKS YOU ARE TAKING ON:\nEvery significant risk in plain language. What the worst case looks like financially.\n\nWHAT YOU SHOULD DO NOW:\nNumbered, specific instructions. Written as if speaking directly to the client.\n\nClose with an invitation to contact the office and a reminder this letter does not substitute for tailored legal advice."},
  clausedna:{id:"clausedna",title:"Clause DNA",isNew:true,desc:"Complete forensic breakdown — risk score, party bias, hidden traps, enforceability, and negotiation strategy.",lbl:"Contract Clause",ph:"Paste any single contract clause here...",rows:8,sys:VOICE+"\n\nForensic clause analysis at elite level.\n\nCLAUSE IDENTIFICATION:\nType, standard name, purpose, and which party typically proposes this clause.\n\nSTANDARDNESS RATING:\nHow standard as a percentage. What deviates from market practice and why it matters.\n\nRISK SCORE:\nRate risk to each party out of 10. Which party bears more risk and precisely why.\n\nPARTY BIAS ANALYSIS:\nEvery word and phrase that favours one party. Quote the specific language and explain the advantage.\n\nHIDDEN TRAPS:\nProvisions that appear reasonable but are dangerous. Undefined terms that will be disputed. Omissions that expose a party.\n\nENFORCEABILITY UNDER NIGERIAN LAW:\nIs this clause enforceable as drafted? Any provisions void or challengeable under Nigerian law.\n\nMISSING PROTECTIONS:\nEvery carve-out or protective provision a well-advised party would insist on.\n\nNEGOTIATION STRATEGY:\nSpecific tactical advice for each side. What to insist on. What to concede. What is a red line. Exact alternative wording to propose.\n\nSUGGESTED REWRITE:\nA revised version that is balanced, enforceable, and commercially reasonable."},
  deadlines:{id:"deadlines",title:"Deadline Intelligence",isNew:true,desc:"Every deadline — explicit and hidden — with consequences, risk ratings, and a compliance calendar.",lbl:"Legal Document",ph:"Paste any legal document — contracts, court orders, filings...",rows:12,sys:VOICE+"\n\nExtract and analyse every deadline. Complete compliance intelligence report.\n\nFor each deadline: exact deadline or trigger event, specific obligation, clause reference, consequence rated CRITICAL/HIGH/MEDIUM/LOW, whether hard or extendable, and notice requirements. Write URGENT ATTENTION REQUIRED before every CRITICAL deadline.\n\nHIDDEN AND IMPLIED DEADLINES:\nDeadlines not stated but implied by Nigerian law, court rules, or practice. The basis for each implied deadline.\n\nDEADLINE INTERACTION ANALYSIS:\nHow deadlines interact. Cascading deadlines. Prerequisites to other rights.\n\nJURISDICTION-SPECIFIC CALCULATION RULES:\nHow to count time under Nigerian law. Public holiday exclusions. Court rule time. Statutory extensions.\n\nCOMPLIANCE CALENDAR:\nAll deadlines chronologically from most to least urgent with a one-line action for each.\n\nTOP 3 RISK ALERTS:\nThe three deadlines most likely to be missed and the consequence of each."},
  digest:{id:"digest",title:"Case Digest Builder",isNew:true,desc:"Transform any Nigerian judgment into a publication-quality digest — ratio, obiter, critical analysis, practice implications.",lbl:"Judgment Text",ph:"Paste the full text of any Nigerian judgment...",rows:14,sys:VOICE+"\n\nProduce a comprehensive publication-quality case digest.\n\nCASE PARTICULARS:\nFull citation as it appears. Court. Coram. Date. Counsel for each party.\n\nFACTS OF THE CASE:\nMaterial facts in numbered paragraphs. What happened. What led to the dispute. What each party claimed.\n\nISSUES FOR DETERMINATION:\nEvery legal question the court had to decide. Numbered. Each stated precisely.\n\nDECISION ON EACH ISSUE:\nThe court's ruling and full reasoning. Quote significant passages. Explain the reasoning chain.\n\nRATIO DECIDENDI:\nThe binding legal principle stated as a proposition of law. Be precise. Every word matters.\n\nOBITER DICTA:\nNon-binding observations worth noting. Their significance and where the law may develop.\n\nSTATUTORY PROVISIONS APPLIED:\nFull names and sections as they appear. How the court interpreted each provision.\n\nCASES REFERRED TO:\nAll cases cited. For each: the principle for which it was cited and whether followed, distinguished, or overruled.\n\nCRITICAL ANALYSIS:\nIs the decision well-reasoned? Are there weaknesses in the logic? Is it likely to be followed or distinguished?\n\nIMPLICATIONS FOR PRACTICE:\nPrecisely how a practitioner should use this case. In what arguments. Against what facts. What it does not decide."},
  legalmemo:{id:"legalmemo",title:"Legal Research Memo",isNew:true,desc:"Partner-quality research memorandum with full legal analysis, risk matrix, and strategic recommendations.",lbl:"Research Brief",ph:"State the question, client situation, key facts, jurisdiction, and any verified authorities...",rows:12,sys:VOICE+"\n\nPartner-quality legal research memorandum ready for client delivery.\n\nQUESTION PRESENTED:\nThe precise legal question in one sentence.\n\nBRIEF ANSWER:\nDirect answer in two sentences. State the conclusion before the analysis.\n\nEXECUTIVE SUMMARY:\nThree paragraphs maximum. Core legal position, key risk, and recommended action.\n\nSTATEMENT OF FACTS:\nLegally relevant facts only.\n\nDISCUSSION:\nFull analysis issue by issue. For each: applicable Nigerian statute or principle, how it applies to these facts, what it means for the client, and what complications arise. Apply verified authorities directly where provided.\n\nKILLER INSIGHT:\nThe one point most lawyers would miss. The nuance that changes the advice.\n\nRISK MATRIX:\nFor each risk: probability (High/Medium/Low), severity if it materialises, and mitigation available.\n\nCONCLUSION:\nClear, direct answer to the question.\n\nRECOMMENDATIONS:\nNumbered, specific actions. Prioritised by urgency.\n\nAUTHORITIES NOTE:\nAll statutes referenced. Advise verification of case authorities on PrimsCol."},
  pleadingcheck:{id:"pleadingcheck",title:"Pleadings Checker",isNew:true,desc:"Every defect found before your opponent does — with grammar audit, rewrites, and filing recommendation.",lbl:"Court Process",ph:"Paste your statement of claim, writ, motion, affidavit, or any court process...",rows:14,sys:VOICE+"\n\nReview this court process as a senior litigator who has seen cases destroyed on preliminary objections.\n\nDOCUMENT IDENTIFICATION:\nType, court, parties, whether properly headed, whether relief is properly formulated.\n\nOVERALL QUALITY RATING:\nRate out of 10. State whether it is ready to file.\n\nFORMAL REQUIREMENTS AUDIT:\nEvery formal requirement checked. For each: whether satisfied, rule checked, and any deficiency.\n\nDEFECTS IDENTIFIED:\nFor each defect: exact defect, rule or law violated, FATAL or AMENDABLE, and precise amendment needed. Number each.\n\nGRAMMAR AND PROFESSIONAL QUALITY AUDIT:\nEvery sentence with grammar errors or unprofessional phrasing. Quote and correct each one.\n\nANTICIPATED PRELIMINARY OBJECTIONS:\nEvery objection ranked by likelihood of success. For each: their argument and the counter-argument.\n\nMISSING ELEMENTS:\nRequired elements entirely absent.\n\nREWRITTEN SECTIONS:\nRewrite every defective section to court-ready standard.\n\nFILING RECOMMENDATION:\nReady to file, minor amendments required, or substantial redraft needed."},
  compliancecal:{id:"compliancecal",title:"Compliance Calendar",isNew:true,desc:"Full annual compliance calendar — every deadline, penalty, responsible officer, and risk alert.",lbl:"Company Details",ph:"Describe the company: type, industry, size, states of operation, licences held, financial year end...",rows:8,sys:VOICE+"\n\nNigerian corporate compliance specialist. Produce a complete actionable compliance calendar.\n\nCOMPANY COMPLIANCE PROFILE:\nSummarise the company's key compliance obligations based on the details provided.\n\nCAMA 2020 OBLIGATIONS:\nEvery obligation under CAMA 2020 with exact deadline, section, responsible officer, and penalty for non-compliance.\n\nFEDERAL TAX OBLIGATIONS:\nEvery FIRS filing — Company Income Tax, Withholding Tax, VAT, PAYE, Education Tax — with exact filing dates, payment dates, applicable rates, and late filing penalties.\n\nSTATE TAX OBLIGATIONS:\nState-specific taxes for each state of operation with deadlines.\n\nSECTOR REGULATORY OBLIGATIONS:\nIndustry-specific filings, licence renewals, and regulatory submissions with deadlines.\n\nLABOUR AND EMPLOYMENT OBLIGATIONS:\nITF levy, NSITF contributions, pension fund remittance, group life insurance — deadlines and penalties.\n\nPENALTY EXPOSURE SUMMARY:\nTop 5 most commonly missed obligations ranked by penalty severity. Total potential penalty exposure if all are missed.\n\nCOMPLIANCE CALENDAR — MONTH BY MONTH:\nAll obligations listed month by month from January to December with the responsible officer.\n\nIMMEDIATE ACTION ITEMS:\nWhat must be done in the next 30 days."},
  courtpredictor:{id:"courtpredictor",title:"Court Success Predictor",isNew:true,desc:"Weighted probability score with factor breakdown, outcome scenarios, financial figures, and tactical strategy.",lbl:"Case Details",ph:"Describe the claim, relief sought, court, and key facts. Add any verified authorities you want considered...",rows:10,sys:VOICE+"\n\nEvaluate this legal position like a senior arbitrator or judge. Produce a full quantified probability analysis.\n\nSUCCESS PROBABILITY SCORE:\nState the overall percentage. Then immediately state what single factor most limits the score and what single factor most supports it.\n\nWEIGHTED FACTOR ANALYSIS:\nScore each factor out of 10 and explain the score fully:\n1. Breach or liability strength\n2. Evidence quality\n3. Contract or document clarity\n4. Termination or procedural validity\n5. Damages quantification strength\n6. Opposing party's defence strength\nDerive the final weighted probability from these scores. Show the calculation.\n\nFORUM ANALYSIS:\nBest court or tribunal for this claim and exactly why. Forum shopping considerations. How the choice of forum shifts probability.\n\nDEFENDANT'S WIN PATH:\nExactly how the defendant wins this case. The specific arguments that could reduce the claimant's probability to below 40%. Do not soften this analysis.\n\nOUTCOME SCENARIOS:\nStrong win: probability, what the court awards, financial range. Partial win: probability, what is awarded, financial range. Loss: probability, what the claimant faces including cost orders.\n\nRISK ALERTS:\nThe two or three things that could collapse this case if not addressed before the hearing.\n\nSTRATEGIC RECOMMENDATIONS:\nSpecific, numbered steps to increase the probability score. Each step must be concrete and actionable.\n\nNEGOTIATION PRESSURE ANALYSIS:\nAt what point does settlement become more rational than litigation for each party? Target settlement range based on probability and financial exposure."},
  clientreport:{id:"clientreport",title:"Client Report Generator",isNew:true,desc:"Describe what happened in court today — get a formal, professional client update letter.",lbl:"What Happened Today",ph:"e.g. Appeared before Justice Adeyemi in FHC Lagos. Matter adjourned to 15 April. Defendant filed counter-affidavit...",rows:9,sys:VOICE+"\n\nDraft a formal client update letter. Professional, precise, complete clarity for the client.\n\nOPENING:\nDear [Client Name]. Re: [Matter Title] — Court Update.\n\nWHAT HAPPENED:\nPrecise, non-technical account of exactly what occurred. Who was present. What was said or decided. What documents were filed or received.\n\nWHAT THIS MEANS FOR YOUR MATTER:\nThe significance. Whether positive, negative, or neutral for the client's position. Be direct.\n\nWHAT THE OTHER SIDE DID:\nAnything the opposing party filed, said, or did that the client should know.\n\nNEXT HEARING AND WHAT TO EXPECT:\nThe next date. What is scheduled. What the court ordered. What we expect to happen.\n\nACTION REQUIRED FROM YOU:\nEvery instruction to the client — documents to provide, decisions to make, funds to arrange. Each item with a specific deadline.\n\nOUR ASSESSMENT:\nA frank assessment of where the matter stands. Are we in a strong or weak position?\n\nClose formally with an invitation to call with questions."},
  feenote:{id:"feenote",title:"Fee Note Builder",isNew:true,desc:"Professionally worded, itemised fee note aligned with NBA Remuneration Rules — ready to send.",lbl:"Work Done",ph:"Describe the legal work: matter type, court appearances, documents drafted, time spent, complexity...",rows:9,sys:VOICE+"\n\nDraft a complete professional fee note ready to send.\n\nFEE NOTE HEADER:\nFirm letterhead block. Date. Fee Note number. Client name and address. Matter reference.\n\nITEMISED PROFESSIONAL CHARGES:\nFor each item: full description of work done, NBA Remuneration Rules scale or time basis, and charge amount. Minimum 6-8 substantive items.\n\nDISBURSEMENTS:\nAll out-of-pocket costs with amounts.\n\nSUBTOTAL, VAT (7.5%), TOTAL DUE:\nAll three lines clearly. Total in figures and words.\n\nPAYMENT TERMS:\nDue date. Bank details placeholder. Late payment consequences.\n\nCLOSING NOTE:\nCharges rendered in accordance with the Legal Practitioners Act and NBA Remuneration Rules. Queries within 14 days."},
  intakememo:{id:"intakememo",title:"Client Intake Memo",isNew:true,desc:"Rough client notes turned into a complete intake memo — causes of action, risk alerts, strategy, fee estimate.",lbl:"Client Situation (Rough Notes)",ph:"e.g. New client. Landlord-tenant dispute. Landlord has served quit notice...",rows:10,sys:VOICE+"\n\nProduce a complete senior-associate quality client intake memorandum.\n\nCLIENT INTAKE MEMORANDUM — CONFIDENTIAL\n\nFACTS AS PRESENTED:\nOrganised narrative in numbered paragraphs. Identify known facts and what needs verification.\n\nLEGAL ISSUES IDENTIFIED:\nEvery cause of action or defence. For each: legal basis, applicable statute or principle, elements to prove, preliminary strength 1-10.\n\nCRITICAL DOCUMENTS TO OBTAIN:\nEvery document needed before full advice. Priority-ranked.\n\nLIMITATION ANALYSIS:\nApplicable limitation period. Is urgent action required? Consequence of delay.\n\nRISK ALERTS:\nSpecific risks the client must be warned about immediately.\n\nPRELIMINARY STRATEGY:\nRecommended approach — litigation, negotiation, or ADR. Why. Likely timeline.\n\nFEE ESTIMATE:\nPreliminary estimate broken down by stage.\n\nIMMEDIATE ACTIONS — NEXT 7 DAYS:\nNumbered. Exactly what the lawyer must do this week."},
  statute:{id:"statute",title:"Statute Explainer",isNew:true,desc:"Paste any Nigerian statutory provision — get the text, meaning, judicial approach, traps, and practical implications.",lbl:"Statutory Section",ph:"e.g. Section 84 Evidence Act 2011, or paste the full text of the provision...",rows:7,sys:VOICE+"\n\nNigerian statutory interpretation specialist. Complete authoritative analysis.\n\nSTATUTE IDENTIFICATION:\nFull name, section and subsections, when it came into force, any amendments.\n\nFULL TEXT:\nThe exact text as enacted.\n\nPLAIN ENGLISH MEANING:\nWhat it means. Who it applies to. What it requires, prohibits, or enables.\n\nLEGISLATIVE PURPOSE:\nWhy this provision was enacted. The mischief it addresses.\n\nJUDICIAL APPROACH:\nHow Nigerian courts have approached this provision. Key interpretive principles. Established meaning of key terms.\n\nARGUMENTS FOR AND AGAINST APPLICATION:\nThe strongest legal arguments on each side.\n\nCOMMON MISTAKES:\nHow lawyers and parties typically misapply this provision.\n\nKILLER INSIGHT:\nThe nuance most lawyers miss. The trap. The opportunity.\n\nPRACTICAL IMPLICATIONS:\nExactly what a lawyer must know when advising a client.\n\nRELATED PROVISIONS:\nOther sections that interact with or qualify this provision."},
  precedent:{id:"precedent",title:"Precedent Clause Library",isNew:true,desc:"Describe the clause you need — three court-ready versions with full drafting notes and negotiation guide.",lbl:"Clause Description",ph:"e.g. Limitation of liability clause for SaaS. Vendor is Nigerian startup. Customer is a large bank...",rows:8,sys:VOICE+"\n\nSenior commercial drafter. Three court-ready clause versions.\n\nCLAUSE IDENTIFICATION:\nType, purpose, risk allocated, and which party typically proposes it.\n\nMARKET POSITION:\nStandard practice in Nigeria for this clause. How the request deviates from market standard.\n\nVERSION 1 — MARKET STANDARD:\nBalanced, properly drafted, with defined terms and standard carve-outs.\n\nVERSION 2 — AGGRESSIVE (MAXIMISES YOUR CLIENT):\nMaximum protection. Every aggressive provision identified with expected pushback.\n\nVERSION 3 — CONCILIATORY (DESIGNED TO GET SIGNED):\nMinimum friction. Every compromise and what the client gives up.\n\nENFORCEABILITY NOTE:\nProvisions that may be void or unenforceable under Nigerian law.\n\nDRAFTING NOTES:\nDefined terms needed. Cross-references. Key drafting considerations.\n\nNEGOTIATION GUIDE:\nOpening position. First concession. What to hold firm on. The dealbreaker. Specific fallback language."},
  correspondence:{id:"correspondence",title:"Correspondence Tracker",isNew:true,desc:"Paste any letter received — demand analysis, legal consequences, exposure assessment, and complete draft reply.",lbl:"Letter Received",ph:"Paste the full text of any letter, demand notice, or legal correspondence...",rows:12,sys:VOICE+"\n\nComplete correspondence intelligence report. Analyse and draft the optimal reply.\n\nLETTER IDENTIFICATION:\nSender, letter type, date, and legal significance of this type of correspondence.\n\nWHAT THEY ARE DEMANDING:\nEvery specific demand or request. Nothing summarised or softened.\n\nDEADLINE ANALYSIS:\nExplicit deadline stated. If none, the implied deadline under Nigerian law and the basis.\n\nLEGAL CONSEQUENCES OF IGNORING:\nExactly what happens legally. What rights they acquire. What proceedings they can commence.\n\nSTRENGTH OF THEIR POSITION:\nIs this legally sound? Where are they overreaching? What are the weaknesses?\n\nEXPOSURE ASSESSMENT:\nRealistic financial and legal exposure if their demands are valid.\n\nRECOMMENDED STRATEGY:\nExact recommendation — respond fully, partially, challenge, seek time, or without-prejudice proposal. Why.\n\nDRAFT REPLY LETTER:\nComplete, formal reply. Addresses every point. Protects the client. Makes no unnecessary admissions. Properly dated and formatted."},
};

function Pulse(){
  return React.createElement("div",{style:{display:"flex",gap:6,alignItems:"center",padding:"14px 0"}},
    [0,1,2].map(i=>React.createElement("span",{key:i,style:{display:"inline-block",width:8,height:8,borderRadius:"50%",background:GOLD,animation:`vPulse 1.2s ${i*0.2}s infinite ease-in-out`}})),
    React.createElement("span",{style:{marginLeft:8,fontSize:13,opacity:0.45}},"Verdict AI is analyzing...")
  );
}

function AuthoritiesBox({val,set,t}){

    React.createElement("div",{style:{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"1.3px",color:GOLD,marginBottom:5}},"Your Verified Authorities (Optional)"),
    React.createElement("div",{style:{fontSize:12,color:"rgba(200,164,94,0.7)",marginBottom:8,lineHeight:1.6}},"Paste cases you have verified on PrimsCol or AfricanLII. The AI will build its analysis around your authorities — not invented ones."),
    React.createElement("textarea",{value:val,onChange:e=>set(e.target.value),placeholder:"e.g. Adesanya v. The State [1981] 2 NCLR 112 — ratio: ...\nSection 84 Evidence Act 2011 — electronic evidence...",rows:4,style:{width:"100%",background:t.input,border:"1px solid rgba(200,164,94,0.15)",borderRadius:7,padding:"9px 12px",fontFamily:"'DM Sans',sans-serif",fontSize:12.5,color:t.text,outline:"none",resize:"vertical",lineHeight:1.6}})
  );
}

    ping();const iv=setInterval(ping,10*60*1000);return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    if(!user)return;

      if(cc)setCases(JSON.parse(cc));

      const nc=Array.isArray(c)?c:[];

    React.createElement("div",{style:{display:"flex",gap:8}},[0,1,2].map(i=>React.createElement("div",{key:i,style:{width:8,height:8,borderRadius:"50%",background:GOLD,animation:`vPulse 1.2s ${i*0.2}s infinite ease-in-out`}})))

  }

  const tier=profile?.tier||"free";

  const renderPage=()=>{

      case "jurisdiction": return React.createElement(JurisdictionPage,{t,go});
      case "nigeriancases": return React.createElement(NigerianCasesPage,{t,go});
      case "lawdatabases": return React.createElement(LawDatabasesPage,{t});
      case "matterclock": return React.createElement(MatterClockPage,{t});
      case "witness": return React.createElement(WitnessPage,{t,go});
      case "evidence": return React.createElement(EvidencePage,{t,go});
      case "settlement": return React.createElement(SettlementPage,{t,go});
      case "negotiation": return React.createElement(NegotiationPage,{t,go});
      case "whatsapp": return React.createElement(WhatsAppPage,{t,go});
      case "seniorpartner": return React.createElement(SeniorPartnerPage,{t,go});
      case "crossexam": return React.createElement(CrossExamPage,{t,go});
      case "motionammo": return React.createElement(MotionAmmoPage,{t,go});
      case "claimanalyser": return React.createElement(ClaimAnalyserPage,{t,go});

      case "vault": return React.createElement(VaultPage,{docs,onDelete:deleteDoc,onRefresh:loadAll,t,go});
      case "cases": return React.createElement(CasesPage,{cases,onAdd:addCase,onUpdate:updateCase,onDelete:deleteCase,t});
      case "profile": return React.createElement(ProfilePage,{profile,onUpdate:updateProfile,t,go});
      case "upgrade": return React.createElement(UpgradePage,{t,go,userTier:tier});
      default: return React.createElement(Dashboard,{go,t,docCount:docs.length,caseCount:cases.length,profile});

      React.createElement("div",{className:"sidebar",style:{background:t.card,borderRight:`1px solid ${t.border}`,transform:sideOpen?"translateX(0)":"translateX(-100%)"}},
        React.createElement("div",{style:{padding:"18px 16px 14px",borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:9}},
            React.createElement("div",{style:{width:32,height:32,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:"#0D1B2E"}},"V"),
            React.createElement("span",{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:t.text}},"Verdict",React.createElement("span",{style:{color:GOLD}},"AI"))
          ),
          React.createElement("button",{onClick:()=>setSideOpen(false),style:{background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:22,padding:4,lineHeight:1}},"×")

          React.createElement("div",{style:{minWidth:0}},
            React.createElement("div",{style:{fontSize:13,fontWeight:600,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},profile?.full_name||"My Account"),
            React.createElement("div",{style:{fontSize:10,color:GOLD,fontWeight:700}},({"free":"FREE","solo":"SOLO","chambers":"CHAMBERS"}[profile?.tier||"free"]||"FREE")+" PLAN")

        React.createElement("nav",{style:{flex:1,padding:"8px 6px",overflowY:"auto"}},
          NAV.map(s=>React.createElement("div",{key:s.sec},
            React.createElement("div",{style:{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"1.5px",color:t.muted,padding:"9px 8px 3px"}},s.sec),
            s.items.map(item=>React.createElement("button",{key:item.id,onClick:()=>go(item.id),style:{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 9px",borderRadius:7,border:page===item.id?"1px solid rgba(200,164,94,0.22)":"1px solid transparent",background:page===item.id?"rgba(200,164,94,0.11)":"none",color:page===item.id?GOLD:t.dim,fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"inherit",marginBottom:1,textAlign:"left",transition:"all 0.12s"}},
              React.createElement("span",{style:{fontSize:14}},item.icon),item.label
            ))

          tier==="free"&&React.createElement("button",{onClick:()=>go("upgrade"),style:{display:"flex",alignItems:"center",justifyContent:"center",width:"100%",padding:"8px",marginBottom:6,borderRadius:7,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,border:"none",color:"#0D1B2E",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},"Upgrade — from NGN 12,000"),
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"4px 8px"}},
            React.createElement("span",null,"☀️"),

              React.createElement("div",{style:{position:"absolute",top:2,left:dark?18:2,width:16,height:16,background:GOLD,borderRadius:"50%",transition:"left 0.3s"}})
            ),
            React.createElement("span",null,"🌙"),
            React.createElement("span",{style:{fontSize:11,color:t.muted}},dark?"Dark":"Light")

      React.createElement("div",{className:"app-body"},
        React.createElement("div",{className:"main-col"},
          React.createElement("div",{className:"topbar",style:{background:t.card,borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px"}},

              React.createElement("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:600,margin:0,color:t.text}},AI_CFGS[page]?.title||pageTitle[page]||"Verdict AI")

                  React.createElement("div",{style:{width:18,height:18,border:`2px solid ${GOLD}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}),
                  "Loading..."

}

function App(){
  return React.createElement(AuthProvider,null,React.createElement(AppContent));
