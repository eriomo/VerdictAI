const SessionContext = createContext({});
function SessionProvider({children}) {
  const [sessionDocs, setSessionDocs] = useState([]);
  const [lastAnalysis, setLastAnalysis] = useState(null);
  const addSessionDoc = (doc) => setSessionDocs(prev => [doc, ...prev.slice(0,4)]);

    value: {sessionDocs, addSessionDoc, lastAnalysis, setLastAnalysis}

}

// ── AI Streaming ──────────────────────────────────────────────────────────────
async function groqStream(sys, user, cb, retryCount = 0) {
  try {
    const res = await fetch('/api/ai', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({system: sys, user: user})
    });

    if (res.status === 429 && retryCount < 3) {
      // Rate limited — show message and retry
      cb('[Verdict AI is busy — retrying in a moment...]\n\n');
      await new Promise(r => setTimeout(r, 5000));
      return groqStream(sys, user, cb, retryCount + 1);
    }

    if (!res.ok) {
      const e = await res.json().catch(() => ({error: 'Unknown error'}));
      throw new Error(e.error || `Server error ${res.status}`);
    }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let full = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      for (const line of dec.decode(value).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6);
        if (d === '[DONE]') continue;
        try {
          const delta = JSON.parse(d).choices[0]?.delta?.content || '';
          full += delta;
          cb(full);
        } catch {}
      }
    }
    return full;
  } catch (err) {
    if (retryCount < 2 && err.message.includes('fetch')) {
      await new Promise(r => setTimeout(r, 3000));
      return groqStream(sys, user, cb, retryCount + 1);
    }
    throw err;
  }
}

// ── PDF Text Extraction (Fix #1: File upload) ─────────────────────────────────
async function extractTextFromPDF(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument({data: e.target.result}).promise;
        let text = '';
        for (let i = 1; i <= Math.min(pdf.numPages, 50); i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(item => item.str).join(' ') + '\n\n';
        }
        resolve(text.trim());
      } catch (err) {
        reject(err);
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

async function extractTextFromFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') return extractTextFromPDF(file);
  if (['txt', 'md'].includes(ext)) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = e => resolve(e.target.result);
      r.onerror = reject;
      r.readAsText(file);
    });
  }
  if (['doc', 'docx'].includes(ext)) {
    // For docx, read as text (basic extraction)
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = e => {
        // Basic text extraction from docx (strips XML tags)
        const text = e.target.result.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        resolve(text || 'Could not extract text from this Word document. Please paste the text manually.');
      };
      r.onerror = reject;
      r.readAsText(file);
    });
  }
  throw new Error('Unsupported file type. Please upload PDF, TXT, or DOCX.');
}

// ── Export Functions (Fix #7: Export to Word/PDF) ─────────────────────────────
function exportToPDF(text, filename = 'verdict-ai-result') {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation: 'portrait', unit: 'mm', format: 'a4'});
  const margin = 20;
  const pageWidth = doc.internal.pageSize.getWidth() - margin * 2;
  const lineHeight = 7;
  let y = margin;

  // Header
  doc.setFillColor(12, 26, 46);
  doc.rect(0, 0, doc.internal.pageSize.getWidth(), 20, 'F');
  doc.setTextColor(200, 164, 94);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('VERDICT AI', margin, 13);
  doc.setTextColor(240, 237, 230);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.text('From documents to decisions.', 80, 13);
  y = 30;

  doc.setTextColor(30, 30, 30);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');

  const lines = doc.splitTextToSize(text, pageWidth);
  lines.forEach(line => {
    if (y > doc.internal.pageSize.getHeight() - margin) {
      doc.addPage();
      y = margin;
    }
    // Bold section headers (ALL CAPS lines ending with colon)
    if (/^[A-Z\s]+:/.test(line.trim())) {
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(12, 26, 46);
    } else {
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(30, 30, 30);
    }
    doc.text(line, margin, y);
    y += lineHeight;
  });

  // Footer
  const pages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text(`Verdict AI — Page ${i} of ${pages} — verdictai.onrender.com`, margin, doc.internal.pageSize.getHeight() - 10);
  }

  doc.save(`${filename}.pdf`);
}

// ── Vault (Fix #2: Persistent storage + Fix #9: Search) ──────────────────────
function VaultPage({docs, t}) {
  const [q, setQ] = useState('');
  const [out, setOut] = useState('');
  const [loading, setLoading] = useState(false);
  const [view, setView] = useState(null);

  // Fix #9: Local search before AI search
  const [localResults, setLocalResults] = useState(null);

  const localSearch = (query) => {
    if (!query.trim()) { setLocalResults(null); return; }
    const q2 = query.toLowerCase();
    const results = docs.filter(d =>
      d.name?.toLowerCase().includes(q2) ||
      d.content?.toLowerCase().includes(q2) ||
      d.analysis?.toLowerCase().includes(q2)
    );
    setLocalResults(results);
  };

  const aiSearch = async () => {
    if (!docs.length) { alert('Your vault is empty. Analyze a document first.'); return; }
    if (!q.trim()) return;
    setLoading(true); setOut('');
    const sys = VOICE + ' Conduct a semantic search of a document vault. Identify which documents are most relevant to the query and explain specifically why. Rank by relevance with a confidence level for each.';
    try { await groqStream(sys, `Query: "${q}"\n\nDocuments:\n${docs.map((d,i)=>`[${i+1}] ${d.name}: ${d.content}`).join('\n')}`, s => setOut(s)); }
    catch(e) { setOut('Error: ' + e.message); }
    setLoading(false);
  };

  if (view) return React.createElement('div', {className:'fade'},
    React.createElement(Btn, {variant:'ghost', sm:true, onClick:()=>setView(null)}, 'Back to Vault'),
    React.createElement('div', {style:{height:20}}),
    React.createElement('h2', {style:{fontFamily:"'Playfair Display',serif",fontSize:20,marginBottom:4,color:t.text}}, view.name),
    React.createElement('div', {style:{fontSize:12,color:t.muted,marginBottom:20}}, view.date),
    view.analysis && React.createElement(React.Fragment, null, React.createElement(Lbl, {t}, 'AI Analysis'), React.createElement(Out, {text:view.analysis, loading:false, t}), React.createElement(ExportBtns, {text:view.analysis, title:'Vault-Document'}))
  );

  const displayDocs = localResults !== null ? localResults : docs;

  return React.createElement('div', {className:'fade'},
    React.createElement(Hdr, {title:'Document Vault', desc:'Every analyzed document is saved here automatically. Search instantly by name, content, or use AI semantic search.', t}),

    // Fix #9: Search bar with instant local search + AI search
    React.createElement('div', {style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      React.createElement(Inp, {val:q, set:v=>{setQ(v);localSearch(v);}, ph:"Search by name, content, or describe what you're looking for...", t, style:{flex:1}}),
      React.createElement(Btn, {onClick:aiSearch, disabled:loading||!q.trim(), variant:'ghost'}, loading ? 'Searching...' : 'AI Search')
    ),

    localResults !== null && React.createElement('div', {style:{fontSize:12,color:t.muted,marginBottom:12}},
      `${localResults.length} result${localResults.length!==1?'s':''} matching "${q}"`
    ),

    out && React.createElement('div', {style:{marginBottom:22}}, React.createElement(Lbl, {t}, 'AI Search Results'), React.createElement(Out, {text:out, loading, t})),

    !docs.length
      ? React.createElement('div', {style:{textAlign:'center',padding:'60px 20px',color:t.muted}},
          React.createElement('div', {style:{fontSize:42,marginBottom:12}}, '🗄️'),
          React.createElement('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:17,marginBottom:7,color:t.dim}}, 'Your vault is empty'),
          React.createElement('div', {style:{fontSize:13,lineHeight:1.6}}, 'Documents you analyze will be saved here automatically.')
        )
      : React.createElement(React.Fragment, null,
          React.createElement('div', {style:{fontSize:12,color:t.muted,marginBottom:12}}, `${docs.length} document${docs.length!==1?'s':''} saved`),
          displayDocs.map((d, i) => React.createElement('div', {key:i, style:{background:t.card,border:`1px solid ${t.border}`,borderRadius:9,padding:'13px 18px',marginBottom:8,display:'flex',alignItems:'center',gap:14}},
            React.createElement('span', {style:{fontSize:22}}, '📄'),
            React.createElement('div', {style:{flex:1}},
              React.createElement('div', {style:{fontWeight:600,fontSize:14,color:t.text}}, d.name),
              React.createElement('div', {style:{fontSize:11,color:t.muted,marginTop:2}}, d.date)
            ),
            React.createElement(Btn, {variant:'ghost', sm:true, onClick:()=>setView(d)}, 'View')
          ))
        )
  );
}
