// ── Stream (v5.0 - server builds system prompt) ───────────────────────────────
async function stream(toolId,userText,cb,retries=0,role="lawyer",courtId="",matterContext=null,matterId=null){
  try{
    const{data:{session}}=await sb.auth.getSession();
    const res=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${session?.access_token||""}`},body:JSON.stringify({user:userText,tool:toolId,role:role||"lawyer",courtId:courtId||"",matterContext:matterContext||null,matterId:matterId||null})});
    if(res.status===403){const e=await res.json();throw new Error(e.error==="FREE_LIMIT_REACHED"?"FREE_LIMIT_REACHED":e.message||"Access denied");}
    if(res.status===429&&retries<3){cb("[Busy - retrying...]\n");await new Promise(r=>setTimeout(r,5000));return stream(toolId,userText,cb,retries+1,role,courtId,matterContext,matterId);}
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`Error ${res.status}`);}
    const reader=res.body.getReader();const dec=new TextDecoder();let full="";
    while(true){const{done,value}=await reader.read();if(done)break;for(const line of dec.decode(value).split("\n")){if(!line.startsWith("data: "))continue;const d=line.slice(6);if(d==="[DONE]")continue;try{const delta=JSON.parse(d).choices?.[0]?.delta?.content||"";full+=delta;cb(full);}catch{}}}
    return full;
  }catch(err){if(retries<2&&err.message.includes("fetch")){await new Promise(r=>setTimeout(r,3000));return stream(toolId,userText,cb,retries+1,role,courtId,matterContext,matterId);}throw err;}
}

// ── File extraction ───────────────────────────────────────────────────────────
async function extractFile(file){
  const ext=file.name.split(".").pop().toLowerCase();
  if(ext==="pdf")return new Promise((res,rej)=>{const r=new FileReader();r.onload=async e=>{try{pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";const pdf=await pdfjsLib.getDocument({data:e.target.result}).promise;let t="";for(let i=1;i<=Math.min(pdf.numPages,50);i++){const pg=await pdf.getPage(i);const ct=await pg.getTextContent();t+=ct.items.map(x=>x.str).join(" ")+"\n\n";}res(t.trim());}catch(e){rej(e);}};r.readAsArrayBuffer(file);});
  if(ext==="docx"||ext==="doc")return new Promise((res,rej)=>{const r=new FileReader();r.onload=async e=>{try{if(window.mammoth&&ext==="docx"){const result=await mammoth.extractRawText({arrayBuffer:e.target.result});if(result.value&&result.value.trim().length>20){res(result.value.trim());return;}}const text=new TextDecoder("utf-8",{fatal:false}).decode(e.target.result).replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g,"").replace(/\s{4,}/g,"\n\n").trim();if(text.length>50)res(text);else rej(new Error("Could not extract text."));}catch(e){rej(e);}};r.readAsArrayBuffer(file);});
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file,"UTF-8");});
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportPDF(text,filename="verdict-ai"){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const m=20,pw=doc.internal.pageSize.getWidth()-m*2;
  doc.setFillColor(12,26,46);doc.rect(0,0,doc.internal.pageSize.getWidth(),20,"F");
  doc.setTextColor(200,164,94);doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("VERDICT AI",m,13);
  let y=30;doc.setTextColor(30,30,30);doc.setFontSize(10);
  doc.splitTextToSize(text,pw).forEach(line=>{if(y>doc.internal.pageSize.getHeight()-m){doc.addPage();y=m;}/^[A-Z][A-Z\s]{3,}:/.test(line.trim())?(doc.setFont("helvetica","bold"),doc.setTextColor(12,26,46)):(doc.setFont("helvetica","normal"),doc.setTextColor(30,30,30));doc.text(line,m,y);y+=7;});
  const pg=doc.internal.getNumberOfPages();for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150);doc.text(`Verdict AI — Page ${i} of ${pg}`,m,doc.internal.pageSize.getHeight()-10);}
  doc.save(`${filename}.pdf`);
}

}

function formatOutput(text){
  if(!text)return[];
  const lines=text.split("\n");const els=[];let k=0;
  for(let line of lines){
    line=line.replace(/^#{1,4}\s*/,"").replace(/\*\*([^*]+)\*\*/g,"__B__$1__E__").replace(/^[-•]\s+/,"").replace(/`([^`]+)`/g,"$1");
    const t=line.trim();
    if(!t){els.push(React.createElement("div",{key:k++,style:{height:10}}));continue;}
    const isH=/^[A-Z][A-Z\s\(\)\/\-&:]{4,}:/.test(t)||(/^[A-Z\s]{5,}$/.test(t)&&t.length<80);
    const isMF=t.startsWith("RATING: MUST FIX")||t.startsWith("MUST FIX")||t.startsWith("RATING: CRITICAL")||t.startsWith("CRITICAL:");
    const isNeg=t.startsWith("RATING: NEGOTIATE")||t.startsWith("NEGOTIATE");
    const isLow=t.startsWith("CITATION CONFIDENCE: LOW");
    const isMed=t.startsWith("CITATION CONFIDENCE: MEDIUM");
    const isHigh=t.startsWith("CITATION CONFIDENCE: HIGH");
    const ri=s=>s.split(/__B__|__E__/).map((p,i)=>i%2===1?React.createElement("strong",{key:i},p):p);
    if(isLow){els.push(React.createElement("div",{key:k++,style:{fontSize:12.5,marginBottom:6,padding:"8px 12px",borderLeft:"3px solid #E05252",background:"rgba(224,82,82,.08)",borderRadius:"0 6px 6px 0",color:"#E05252",fontWeight:600}},t));continue;}
    if(isMed){els.push(React.createElement("div",{key:k++,style:{fontSize:12.5,marginBottom:6,padding:"8px 12px",borderLeft:"3px solid #F0A500",background:"rgba(240,165,0,.08)",borderRadius:"0 6px 6px 0",color:"#F0A500",fontWeight:600}},t));continue;}
    if(isHigh){els.push(React.createElement("div",{key:k++,style:{fontSize:12.5,marginBottom:6,padding:"8px 12px",borderLeft:"3px solid #2ECC8A",background:"rgba(46,204,138,.08)",borderRadius:"0 6px 6px 0",color:"#2ECC8A",fontWeight:600}},t));continue;}
    if(isMF){els.push(React.createElement("div",{key:k++,style:{fontSize:13,marginBottom:6,padding:"8px 12px",borderLeft:"3px solid #C0392B",background:"rgba(192,57,43,.1)",borderRadius:"0 6px 6px 0"}},ri(t)));continue;}
    if(isNeg){els.push(React.createElement("div",{key:k++,style:{fontSize:13,marginBottom:6,padding:"8px 12px",borderLeft:"3px solid #E67E22",background:"rgba(230,126,34,.1)",borderRadius:"0 6px 6px 0"}},ri(t)));continue;}
    if(isH){els.push(React.createElement("div",{key:k++,style:{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:GOLD,letterSpacing:".8px",marginTop:18,marginBottom:6,borderBottom:"1px solid rgba(200,164,94,.2)",paddingBottom:4}},t));continue;}
    els.push(React.createElement("div",{key:k++,style:{fontSize:13.5,lineHeight:1.85,marginBottom:4}},ri(t)));
  }
  return els;
}

            React.createElement("button",{onClick:toggleDark,style:{background:"none",border:"none",cursor:"pointer",padding:6,borderRadius:8,display:"flex",alignItems:"center"}},Ic({n:dark?"sun":"moon",sz:15,c:t.muted})),
            React.createElement("div",{onClick:()=>go("profile"),style:{width:30,height:30,borderRadius:"50%",background:`linear-gradient(135deg,${rc.color},${rc.color}cc)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff",cursor:"pointer",flexShrink:0}},(profile?.full_name||user?.email||"U")[0].toUpperCase())
          )
        ),
        React.createElement("div",{key:page,className:"content-area"},renderPage())

    ),
    React.createElement("div",{className:"bottom-tabs",style:{background:t.card}},
      mobileTabs.map(tab=>React.createElement("button",{key:tab.id,className:"bottom-tab",onClick:()=>go(tab.id),style:{color:page===tab.id?rc.color:t.muted}},
        UIIc({id:tab.id,c:page===tab.id?rc.color:t.muted,sz:18}),React.createElement("span",null,tab.label)
      ))
    )
  );
}

function App(){return React.createElement(AuthProvider,null,React.createElement(AppContent));}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
