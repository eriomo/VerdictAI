// ── Persist Hook — stores page state in localStorage so it survives navigation and logout ──
function usePersist(key, initial) {
  const [val, setVal] = useState(()=>{
    try { const s = localStorage.getItem('vd_p_'+key); if(s !== null) return JSON.parse(s); } catch {}
    return initial;
  });
  const valRef = useRef(val);
  valRef.current = val;
  const set = (updater) => {
    const next = typeof updater === 'function' ? updater(valRef.current) : updater;
    valRef.current = next;
    setVal(next);
    try { localStorage.setItem('vd_p_'+key, JSON.stringify(next)); } catch {}
  };
  return [val, set];
}
function clearPersist(...keys) {
  keys.forEach(k => { try { localStorage.removeItem('vd_p_'+k); } catch {} });
}
function clearAllPageStates() {
  try {
    Object.keys(localStorage).filter(k=>k.startsWith('vd_p_')).forEach(k=>localStorage.removeItem(k));
  } catch {}
}

async function api(path,opts={}){

  const res = await fetch(path,{...opts,headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`,...(opts.headers||{})},body:opts.body?JSON.stringify(opts.body):undefined});

// ── AI Streaming ──────────────────────────────────────────────────────────────
async function stream(sys,user,cb,retries=0){
  try{
    const {data:{session}} = await sb.auth.getSession();
    const res = await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${session?.access_token||""}`},body:JSON.stringify({system:sys,user})});
    if(res.status===403){const e=await res.json();throw new Error(e.error==="FREE_LIMIT_REACHED"?"FREE_LIMIT_REACHED":e.message||"Access denied");}
    if(res.status===429&&retries<3){cb("[Busy — retrying...]\n");await new Promise(r=>setTimeout(r,5000));return stream(sys,user,cb,retries+1);}
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`Error ${res.status}`);}
    const reader=res.body.getReader();const dec=new TextDecoder();let full="";
    while(true){
      const {done,value}=await reader.read();if(done)break;
      for(const line of dec.decode(value).split("\n")){
        if(!line.startsWith("data: "))continue;
        const d=line.slice(6);if(d==="[DONE]")continue;
        try{const delta=JSON.parse(d).choices[0]?.delta?.content||"";full+=delta;cb(full);}catch{}
      }
    }
    return full;
  }catch(err){
    if(retries<2&&err.message.includes("fetch")){await new Promise(r=>setTimeout(r,3000));return stream(sys,user,cb,retries+1);}
    throw err;
  }
}

// ── File extraction ───────────────────────────────────────────────────────────
async function extractFile(file){
  const ext=file.name.split(".").pop().toLowerCase();
  if(ext==="pdf"){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try{
          pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
          const pdf=await pdfjsLib.getDocument({data:e.target.result}).promise;
          let text="";
          for(let i=1;i<=Math.min(pdf.numPages,50);i++){
            const pg=await pdf.getPage(i);
            const ct=await pg.getTextContent();
            text+=ct.items.map(x=>x.str).join(" ")+"\n\n";
          }
          res(text.trim());
        }catch(err){rej(err);}
      };
      r.readAsArrayBuffer(file);
    });
  }
  if(ext==="docx"||ext==="doc"){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try{
          if(window.mammoth&&ext==="docx"){
            const result=await mammoth.extractRawText({arrayBuffer:e.target.result});
            if(result.value&&result.value.trim().length>20){res(result.value.trim());return;}
          }
          try{
            const uint8=new Uint8Array(e.target.result);
            const str=new TextDecoder("utf-8").decode(uint8);
            const xmlMatch=str.match(/word\/document\.xml[^<]*(<\?xml[^]*?<\/w:document>)/);
            if(xmlMatch){
              const xml=xmlMatch[1];
              const text=xml.replace(/<w:br[^>]*>/g,"\n").replace(/<w:p[\s>][^>]*>/g,"\n").replace(/<[^>]+>/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#x[0-9A-F]+;/gi,"").replace(/\s{3,}/g,"\n\n").trim();
              if(text.length>20){res(text);return;}
            }
          }catch{}
          const decoder=new TextDecoder("utf-8",{fatal:false});
          const text=decoder.decode(e.target.result);
          const clean=text.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f\x7f-\x9f]/g,"").replace(/[^\x20-\x7e\n\r\t\u00A0-\uFFFF]/g,"").replace(/\s{4,}/g,"\n\n").trim();
          if(clean.length>50)res(clean);
          else rej(new Error("Could not extract readable text from this file. Please copy and paste the text directly."));
        }catch(err){rej(err);}
      };
      r.readAsArrayBuffer(file);
    });
  }
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=rej;
    r.readAsText(file,"UTF-8");
  });
}

// ── Exports ───────────────────────────────────────────────────────────────────
function exportPDF(text,filename="verdict-ai"){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const m=20,pw=doc.internal.pageSize.getWidth()-m*2,lh=7;
  doc.setFillColor(12,26,46);doc.rect(0,0,doc.internal.pageSize.getWidth(),20,"F");
  doc.setTextColor(200,164,94);doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("VERDICT AI",m,13);
  doc.setTextColor(240,237,230);doc.setFontSize(9);doc.setFont("helvetica","normal");doc.text("From documents to decisions.",80,13);
  let y=30;doc.setTextColor(30,30,30);doc.setFontSize(10);
  doc.splitTextToSize(text,pw).forEach(line=>{
    if(y>doc.internal.pageSize.getHeight()-m){doc.addPage();y=m;}
    if(/^[A-Z\s]+:/.test(line.trim())){doc.setFont("helvetica","bold");doc.setTextColor(12,26,46);}
    else{doc.setFont("helvetica","normal");doc.setTextColor(30,30,30);}
    doc.text(line,m,y);y+=lh;
  });
  const pg=doc.internal.getNumberOfPages();
  for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150);doc.text(`Verdict AI — Page ${i} of ${pg}`,m,doc.internal.pageSize.getHeight()-10);}
  doc.save(`${filename}.pdf`);
}

async function exportDOCX(text,filename="verdict-ai"){
  try{
    const {Document,Packer,Paragraph,TextRun,BorderStyle}=window.docx;
    const lines=text.split("\n");
    const children=[
      new Paragraph({children:[new TextRun({text:"VERDICT AI",bold:true,size:28,color:"C8A45E",font:"Calibri"}),new TextRun({text:"   |   From documents to decisions.",size:18,color:"888888",font:"Calibri"})],spacing:{after:200},border:{bottom:{style:BorderStyle.SINGLE,size:6,color:"C8A45E"}}}),
      new Paragraph({text:"",spacing:{after:100}}),
    ];
    lines.forEach(line=>{
      const t=line.trim();
      if(!t){children.push(new Paragraph({text:"",spacing:{after:80}}));return;}
      if(/^[A-Z][A-Z\s]{3,}:/.test(t)){
        children.push(new Paragraph({children:[new TextRun({text:t,bold:true,size:22,color:"0A1628",font:"Calibri"})],spacing:{before:240,after:80},border:{bottom:{style:BorderStyle.SINGLE,size:3,color:"E0DAD0"}}}));
      } else {
        children.push(new Paragraph({children:[new TextRun({text:t,size:20,font:"Calibri",color:"1A1A2E"})],spacing:{after:80}}));
      }
    });
    children.push(new Paragraph({children:[new TextRun({text:`Generated by Verdict AI — ${new Date().toLocaleDateString()} — verdictai.onrender.com`,size:16,color:"888888",italics:true,font:"Calibri"})],border:{top:{style:BorderStyle.SINGLE,size:3,color:"E0DAD0"}},spacing:{before:300}}));
    const doc=new Document({creator:"Verdict AI",title:filename,sections:[{properties:{},children}]});
    const blob=await Packer.toBlob(doc);
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename+".docx";a.click();URL.revokeObjectURL(url);
  }catch(err){
    const b=new Blob([text],{type:"application/msword"});
    const url=URL.createObjectURL(b);
    const a=document.createElement("a");a.href=url;a.download=filename+".doc";a.click();
  }
}

  briefscore:{id:"briefscore",title:"Brief-to-Win Score",desc:"Score your brief on five dimensions before filing.",lbl:"Legal Brief",ph:"Paste your complete legal brief here...",rows:14,sys:VOICE+"\n\nReview this brief rigorously.\n\nOVERALL SCORE:\nOut of 100 with letter grade A-F.\n\nDIMENSION SCORES (each out of 20):\n1. Argument Strength\n2. Citation Quality\n3. Logical Flow\n4. Persuasion and Clarity\n5. Technical Accuracy\n\nSPECIFIC IMPROVEMENTS:\nIdentify passages needing improvement.\n\nSTRONGEST SECTIONS:\nWhat works well.\n\nREWRITTEN SAMPLE:\nRewrite the weakest paragraph to standard.\n\nDISCLAIMER: For informational purposes only. Not legal advice."},
  explainer:{id:"explainer",title:"Client Explainer",desc:"Turn any legal analysis into a plain English client letter.",lbl:"Legal Text",ph:"Paste the document or analysis to explain to your client...",rows:12,sys:VOICE+"\n\nDraft a formal client letter in plain English.\n\nWHAT THIS DOCUMENT SAYS:\nPlain English, no jargon.\n\nWHAT THIS MEANS FOR YOU:\nPractical implications.\n\nKEY RISKS TO BE AWARE OF:\nRisks and deadlines in plain terms.\n\nWHAT HAPPENS NEXT:\nNext steps clearly explained.\n\nClose with an invitation to contact the office with questions."},
  clausedna:{id:"clausedna",title:"Clause DNA",isNew:true,desc:"Complete forensic breakdown of any contract clause.",lbl:"Contract Clause",ph:"Paste any single contract clause here...",rows:8,sys:VOICE+"\n\nForensic clause analysis.\n\nCLAUSE IDENTIFICATION:\nType, standard name, and purpose.\n\nSTANDARDNESS ASSESSMENT:\nHow standard as a percentage.\n\nRISK SCORE:\nRisk as percentage. Which party bears more risk.\n\nJURISDICTION AND PARTY BIAS:\nWhich jurisdiction and party this favours.\n\nINDUSTRY BENCHMARK:\nComparison to market practice.\n\nMISSING PROTECTIONS:\nAbsent carve-outs a well-advised party would insist on.\n\nNEGOTIATION STRATEGY:\nSpecific tactical advice.\n\nSUGGESTED REWRITE:\nRevised version if problematic.\n\nDISCLAIMER: For informational purposes only. Not legal advice."},
  deadlines:{id:"deadlines",title:"Deadline Intelligence",isNew:true,desc:"Every deadline — explicit and implied — with stakes and consequences.",lbl:"Legal Document",ph:"Paste any legal document — contracts, court orders, filings...",rows:12,sys:VOICE+"\n\nExtract every deadline — explicit and implied.\n\nFor each: the deadline, the obligation, the specific clause, the consequence classified as CRITICAL/HIGH/MEDIUM/LOW, and how derived. Write URGENT ATTENTION REQUIRED before CRITICAL deadlines. Sort by urgency.\n\nCOMPLIANCE CALENDAR NOTES:\nHow deadlines interact, jurisdiction-specific calculation rules.\n\nDISCLAIMER: Verify all deadlines with a qualified legal professional."},
  digest:{id:"digest",title:"Case Digest Builder",isNew:true,desc:"Transform any Nigerian judgment into a structured digest — ratio, obiter, implications.",lbl:"Judgment Text",ph:"Paste the full text of any Nigerian judgment...",rows:14,sys:VOICE+"\n\nCASE PARTICULARS:\nFull citation, court, year, date, counsel for each party.\n\nFACTS OF THE CASE:\nMaterial facts in numbered paragraphs.\n\nISSUES FOR DETERMINATION:\nEach legal issue, numbered.\n\nDECISION AND REASONING:\nCourt reasoning on each issue.\n\nRATIO DECIDENDI:\nThe binding legal principle. Most important section.\n\nOBITER DICTA:\nNon-binding but significant observations.\n\nSTATUTORY PROVISIONS APPLIED:\nFull names and specific sections.\n\nCASES REFERRED TO:\nAll cases cited and their relevance.\n\nIMPLICATIONS FOR PRACTICE:\nHow a practitioner should use this case."},
  legalmemo:{id:"legalmemo",title:"Legal Research Memo",isNew:true,desc:"Generate a full partner-quality research memorandum.",lbl:"Research Brief",ph:"State the question, client situation, key facts, jurisdiction, and background...",rows:12,sys:VOICE+"\n\nPartner-quality research memorandum.\n\nQUESTION PRESENTED:\nPrecise formulation of the legal question in one sentence.\n\nBRIEF ANSWER:\nDirect answer in 2-3 sentences with core legal basis.\n\nSTATEMENT OF FACTS:\nRelevant facts for this analysis.\n\nDISCUSSION:\nFull legal analysis by issue. Cite Nigerian statutes with full names and sections. Cite cases with full citations.\n\nCONCLUSION:\nClear, direct answer.\n\nRECOMMENDATIONS:\nSpecific recommended course of action.\n\nAUTHORITIES CITED:\nComplete list of all cases, statutes, and regulations."},
  pleadingcheck:{id:"pleadingcheck",title:"Pleadings Checker",isNew:true,desc:"AI finds every defect in your court process before your opponent does.",lbl:"Court Process",ph:"Paste your statement of claim, writ, motion, affidavit, or any court process...",rows:14,sys:VOICE+"\n\nExpert Nigerian civil procedure reviewer.\n\nDOCUMENT IDENTIFICATION:\nType of process, court, parties, whether properly headed.\n\nFORMAL REQUIREMENTS CHECK:\nDoes it satisfy formal requirements? State specific rules checked.\n\nDEFECTS IDENTIFIED:\nFor each defect: the defect, rule violated, whether FATAL or AMENDABLE. Number each.\n\nANTICIPATED OBJECTIONS:\nPreliminary objections opponent will raise, ranked strongest to weakest. For each: their argument and how to counter.\n\nMISSING ELEMENTS:\nRequired elements entirely absent.\n\nSTRENGTHS:\nWhat is properly and effectively drafted.\n\nRECOMMENDED AMENDMENTS:\nSpecific amendments to make before filing. Numbered."},
  compliancecal:{id:"compliancecal",title:"Compliance Calendar",isNew:true,desc:"Full annual compliance calendar with every statutory deadline, penalty, and responsible officer.",lbl:"Company Details",ph:"Describe the company: type, industry, size, states of operation, licences held, financial year end...",rows:8,sys:VOICE+"\n\nNigerian corporate compliance specialist.\n\nCAMA 2020 OBLIGATIONS:\nAll Companies and Allied Matters Act obligations with deadlines.\n\nTAX OBLIGATIONS:\nFIRS filings — CIT, WHT, VAT, PAYE, education tax — with exact deadlines.\n\nSTATE TAX OBLIGATIONS:\nState-specific tax requirements.\n\nSECTOR REGULATORY OBLIGATIONS:\nIndustry-specific regulatory filings.\n\nLABOUR AND EMPLOYMENT OBLIGATIONS:\nITF levy, NSITF, pension, group life insurance.\n\nPENALTY SUMMARY:\nTop 5 most commonly missed deadlines and their penalties."},
  courtpredictor:{id:"courtpredictor",title:"Court Success Predictor",isNew:true,desc:"AI-powered probability of success based on Nigerian case law patterns, court selection, and judge profile.",lbl:"Case Details",ph:"Describe the claim, relief sought, court, judge name if known, and key facts...",rows:10,sys:VOICE+"\n\nNigerian litigation probability specialist.\n\nSUCCESS PROBABILITY:\nOverall probability as a percentage with key factors driving the assessment.\n\nFORUM ANALYSIS:\nWhich court and division gives best prospects and why. Forum shopping considerations.\n\nJUDICIAL TENDENCIES:\nIf a judge is named, what is known about their approach from reported decisions.\n\nCOMPARABLE OUTCOMES:\nNigerian cases with similar facts and outcomes. Quote specific decisions.\n\nFACTORS INCREASING PROBABILITY:\nWhat makes this case stronger with legal basis.\n\nFACTORS REDUCING PROBABILITY:\nWhat makes this case weaker with legal basis.\n\nSTRATEGIC RECOMMENDATIONS:\nSpecific steps to improve success probability."},
  clientreport:{id:"clientreport",title:"Client Report Generator",isNew:true,desc:"Describe what happened in your matter today and get a formal client update letter in seconds.",lbl:"What Happened Today",ph:"e.g. Appeared before Justice Adeyemi in the Federal High Court today. Matter adjourned to 15 April for hearing. Defendant filed a counter-affidavit...",rows:9,sys:VOICE+"\n\nDraft a formal client update letter following a court appearance or other legal event.\n\nDear [Client Name],\n\nMATTER: [Insert matter title]\n\nWe write to update you on the above-referenced matter.\n\nWHAT HAPPENED:\nClear non-technical account of exactly what occurred.\n\nWHAT THIS MEANS:\nPlain English explanation of the significance of what happened.\n\nNEXT STEPS:\nWhat happens next, when, and what the client needs to do or prepare.\n\nACTION REQUIRED FROM YOU:\nAny specific instructions, documents, or decisions needed from the client by a specified date.\n\nClose formally. Add a note to contact the office with questions."},
  feenote:{id:"feenote",title:"Fee Note Builder",isNew:true,desc:"Professionally worded, itemised fee note aligned with Nigerian Bar Association fee scales.",lbl:"Work Done",ph:"Describe the legal work: matter type, work performed, court appearances, documents drafted, time spent, complexity, outcome achieved...",rows:9,sys:VOICE+"\n\nSenior partner drafting a formal fee note for professional legal services.\n\nFEE NOTE\n\n[Law Firm Letterhead]\nDate: [Date]\nFee Note No.: [Number]\n\nTO: [Client Name and Address]\n\nRE: Professional Charges — [Matter Title]\n\nWe render our professional charges for services rendered as follows:\n\nITEMISED CHARGES:\nFor each item of work: description of work done, the applicable NBA scale or basis of charge, and the amount. Number each item.\n\nSUBTOTAL:\nTotal professional fees before VAT.\n\nVAT (7.5%):\nVAT amount.\n\nTOTAL DUE:\nTotal amount due.\n\nPAYMENT TERMS:\nDue date and payment instructions.\n\nNOTE: These charges are rendered in accordance with the Legal Practitioners Act and the Nigerian Bar Association Remuneration Rules."},
  intakememo:{id:"intakememo",title:"Client Intake Memo",isNew:true,desc:"Rough client notes turned into a full intake memo, causes of action, timeline, cost estimate, and engagement letter.",lbl:"Client Situation (Rough Notes)",ph:"e.g. New client. Landlord-tenant dispute. Property in Ikoyi. Client is the tenant. Landlord has served quit notice claiming rent arrears of 6 months but client says he paid...",rows:10,sys:VOICE+"\n\nSenior associate producing a complete client intake memorandum from initial instructions.\n\nCLIENT INTAKE MEMORANDUM\n\nFACTS AS PRESENTED:\nOrganised narrative of the client instructions in numbered paragraphs.\n\nLEGAL ISSUES IDENTIFIED:\nAll causes of action or defences arising from the facts. For each: legal basis, applicable statute or principle, preliminary strength assessment.\n\nCRITICAL DOCUMENTS TO OBTAIN:\nAll documents the lawyer must collect before advising fully.\n\nLIMITATION ANALYSIS:\nAre there any imminent limitation deadlines? Any urgent steps required?\n\nPRELIMINARY STRATEGY:\nRecommended approach and next steps.\n\nESTIMATED TIMELINE:\nRealistic timeline from instruction to resolution.\n\nPRELIMINARY FEE ESTIMATE:\nEstimate of professional charges for this matter.\n\nNEXT ACTIONS:\nNumbered list of immediate actions for the lawyer to take within 7 days."},
  statute:{id:"statute",title:"Statute Explainer",isNew:true,desc:"Paste any Nigerian statutory section — get the text, plain English meaning, judicial interpretation, and leading cases instantly.",lbl:"Statutory Section",ph:"e.g. Section 84 Evidence Act 2011, or Section 394 CAMA 2020, or paste the full text of the provision...",rows:7,sys:VOICE+"\n\nNigerian statutory interpretation specialist.\n\nSTATUTE IDENTIFICATION:\nFull name of the Act, section number, and when it came into force.\n\nFULL TEXT:\nThe exact text of the provision as enacted.\n\nPLAIN ENGLISH MEANING:\nWhat this section means in plain language. Who it applies to and what it requires or prohibits.\n\nJUDICIAL INTERPRETATION:\nHow Nigerian courts have interpreted this provision. Quote the most authoritative cases.\n\nLEADING CASES:\nThe 3-5 most important Nigerian cases on this provision with citations and the principle decided.\n\nCOMMON ARGUMENTS:\nThe arguments lawyers typically make for and against the application of this provision.\n\nPRACTICAL IMPLICATIONS:\nWhat a lawyer needs to know when advising a client on this provision.\n\nRELATED PROVISIONS:\nOther sections that interact with this provision."},
  precedent:{id:"precedent",title:"Precedent Clause Library",isNew:true,desc:"Describe the clause you need — get 3 versions: market standard, aggressive, and conservative. Ready to paste into any contract.",lbl:"Clause Description",ph:"e.g. Limitation of liability clause for a SaaS software agreement. Vendor is a Nigerian tech startup. Customer is a large bank. I need a clause that protects the vendor...",rows:8,sys:VOICE+"\n\nSenior commercial drafter producing precedent clauses for Nigerian contracts.\n\nCLAUSE IDENTIFICATION:\nType of clause, its purpose, and how it typically appears in Nigerian commercial contracts.\n\nVERSION 1 — MARKET STANDARD:\nThe clause as it typically appears in a balanced Nigerian commercial contract. Properly drafted with defined terms.\n\nVERSION 2 — AGGRESSIVE (FAVOURS YOUR CLIENT):\nA version that maximises protection for the instructing party. Note what makes it aggressive and what the other side may push back on.\n\nVERSION 3 — CONSERVATIVE (CONCILIATORY):\nA version designed to be acceptable to both parties with minimal friction. Note the compromises made.\n\nDRAFTING NOTES:\nKey points to note about each version. Any provisions that may be unenforceable under Nigerian law.\n\nNEGOTIATION GUIDE:\nWhat to insist on, what to concede, and what is a red line."},
  correspondence:{id:"correspondence",title:"Correspondence Tracker",isNew:true,desc:"Paste any letter you received. AI extracts what they want, the deadline, legal consequences, and drafts the perfect reply.",lbl:"Letter Received",ph:"Paste the full text of the letter, demand notice, legal correspondence, or any document you received...",rows:12,sys:VOICE+"\n\nExperienced legal correspondent reviewing incoming legal correspondence.\n\nLETTER IDENTIFICATION:\nWho sent this, what type of letter it is, and the date.\n\nWHAT THEY WANT:\nExactly what the sender is demanding or requesting in plain terms.\n\nDEADLINE STATED OR IMPLIED:\nThe explicit deadline given, or if none is stated, the deadline implied by Nigerian law or practice.\n\nLEGAL CONSEQUENCES OF IGNORING:\nWhat will happen legally and practically if this letter is not responded to.\n\nSTRENGTH OF THEIR POSITION:\nIs this letter legally sound? Are their demands enforceable? Are there weaknesses in their position?\n\nRECOMMENDED RESPONSE STRATEGY:\nShould you respond, concede, challenge, or seek more information? Explain why.\n\nDRAFT REPLY:\nA complete, formal reply letter addressing each point in their correspondence. The reply must protect your client position and not make admissions."},
};

function Pulse(){
  return React.createElement("div",{style:{display:"flex",gap:6,alignItems:"center",padding:"14px 0"}},
    [0,1,2].map(i=>React.createElement("span",{key:i,style:{display:"inline-block",width:8,height:8,borderRadius:"50%",background:GOLD,animation:`vPulse 1.2s ${i*0.2}s infinite ease-in-out`}})),
    React.createElement("span",{style:{marginLeft:8,fontSize:13,opacity:0.45}},"Verdict AI is analyzing...")
  );
}

function CitationWarning({text,t}){
  const [dismissed,setDismissed]=useState(false);
  if(!text||dismissed)return null;
  if(!/\b(v\.?\s+|\[\d{4}\]|\(\d{4}\)|NWLR|LRN|FWLR|NLR|SC\.|CA\.)/.test(text))return null;
  return React.createElement("div",{style:{background:"rgba(240,165,0,0.08)",border:"1px solid rgba(240,165,0,0.35)",borderRadius:8,padding:"10px 14px",marginTop:10,display:"flex",gap:10,fontSize:12.5}},
    React.createElement("span",{style:{flexShrink:0}},"⚠️"),
    React.createElement("div",{style:{flex:1,color:"rgba(240,165,0,0.9)",lineHeight:1.6}},
      React.createElement("strong",null,"Citation Verification Required: "),
      "Verify all case citations on PrimsCol or current Nigerian law reports before relying on them in court or documents."
    ),
    React.createElement("button",{onClick:()=>setDismissed(true),style:{background:"none",border:"none",color:"rgba(240,165,0,0.6)",cursor:"pointer",fontSize:18,flexShrink:0,padding:0,lineHeight:1}},"×")
  );
}

function Btn({onClick,disabled,children,variant="gold",sm,full}){

function Inp({val,set,ph,rows,t,style={},onKey}){
  const base={width:"100%",background:t.input,border:`1px solid ${t.border}`,borderRadius:8,padding:"11px 14px",fontFamily:"'DM Sans',sans-serif",fontSize:13.5,color:t.text,outline:"none",...style};
  const focus=e=>{e.target.style.borderColor=GOLD;};
  const blur=e=>{e.target.style.borderColor=t.border;};
  return rows
    ?React.createElement("textarea",{value:val,onChange:e=>set(e.target.value),placeholder:ph,rows,onFocus:focus,onBlur:blur,style:{...base,resize:"vertical",lineHeight:1.7}})
    :React.createElement("input",{value:val,onChange:e=>set(e.target.value),placeholder:ph,onFocus:focus,onBlur:blur,onKeyDown:onKey,style:base});
}

// ── Sel — supports both flat arrays and grouped arrays [{group, items}] ────────
function Sel({val,set,opts,ph,t}){
  const isGrouped = Array.isArray(opts) && opts.length > 0 && typeof opts[0] === 'object' && opts[0].group;
  return React.createElement("select",{value:val,onChange:e=>set(e.target.value),style:{width:"100%",background:t.input,border:`1px solid ${t.border}`,borderRadius:8,padding:"11px 14px",fontFamily:"'DM Sans',sans-serif",fontSize:13.5,color:val?t.text:t.muted,outline:"none"}},
    React.createElement("option",{value:""},ph||"Select..."),
    isGrouped
      ? opts.map(g=>React.createElement("optgroup",{key:g.group,label:"— "+g.group+" —"},
          g.items.map(o=>React.createElement("option",{key:o,value:o},o))
        ))
      : opts.map(o=>React.createElement("option",{key:o,value:o},o))
  );
}

function Out({text,loading,ph,t}){
  const ref=useRef();
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[text]);
  return React.createElement("div",{ref,style:{background:t.input,border:`1px solid ${t.border}`,borderRadius:10,padding:20,minHeight:180,maxHeight:440,overflowY:"auto",fontSize:14,lineHeight:2,whiteSpace:"pre-wrap",wordBreak:"break-word",color:t.text}},
    loading&&!text?React.createElement(Pulse):!loading&&!text?React.createElement("span",{style:{color:t.muted,fontStyle:"italic",fontSize:13.5}},ph||"Results appear here..."):text
  );
}

function FileUpload({onText,t,label}){
  const [dragging,setDragging]=useState(false);

function AppContent(){
  const {user,loading:authLoading}=useAuth();
  const [page,setPage]=useState("dashboard");
  const [showAuth,setShowAuth]=useState(false);
  const [dark,setDark]=useState(getTheme);
  const [sideOpen,setSideOpen]=useState(false);
  const [docs,setDocs]=useState([]);
  const [cases,setCases]=useState([]);
  const [profile,setProfile]=useState(null);
  const [dataLoading,setDataLoading]=useState(false);
  const t=theme(dark);

  useEffect(()=>{
    const ping=async()=>{try{await fetch("/api/health");}catch{}};
    ping();
    const iv=setInterval(ping,10*60*1000);
    return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    try{
      if(localStorage.getItem("vd_theme"))return;
      const mq=window.matchMedia("(prefers-color-scheme: dark)");
      const h=e=>setDark(e.matches);
      mq.addEventListener("change",h);
      return()=>mq.removeEventListener("change",h);
    }catch{}
  },[]);

  useEffect(()=>{
    if(!user)return;
    try{
      const cd=sessionStorage.getItem("vd_docs");
      const cc=sessionStorage.getItem("vd_cases");
      const cp=sessionStorage.getItem("vd_profile");
      if(cd)setDocs(JSON.parse(cd));
      if(cc)setCases(JSON.parse(cc));
      if(cp)setProfile(JSON.parse(cp));
    }catch{}
    loadAll(true);
  },[user]);

  const loadAll=async(silent=false)=>{
    if(!silent)setDataLoading(true);
    try{
      const [d,c,p]=await Promise.all([
        api("/api/documents").catch(()=>[]),
        api("/api/cases").catch(()=>[]),
        api("/api/profile").catch(()=>null),
      ]);
      const nd=Array.isArray(d)?d:[];
      const nc=Array.isArray(c)?c:[];
      setDocs(nd);setCases(nc);setProfile(p);
      try{
        sessionStorage.setItem("vd_docs",JSON.stringify(nd));
        sessionStorage.setItem("vd_cases",JSON.stringify(nc));
        sessionStorage.setItem("vd_profile",JSON.stringify(p));
      }catch{}
    }catch(e){console.log("Load error:",e.message);}
    if(!silent)setDataLoading(false);
  };

  const saveDoc=async doc=>{
    try{const d=await api("/api/documents",{method:"POST",body:doc});const u=[d,...docs];setDocs(u);try{sessionStorage.setItem("vd_docs",JSON.stringify(u));}catch{};}catch(e){console.log("Save doc error:",e.message);}
  };
  const deleteDoc=async id=>{await api(`/api/documents/${id}`,{method:"DELETE"});const u=docs.filter(d=>d.id!==id);setDocs(u);try{sessionStorage.setItem("vd_docs",JSON.stringify(u));}catch{};};
  const addCase=async data=>{const c=await api("/api/cases",{method:"POST",body:data});const u=[c,...cases];setCases(u);try{sessionStorage.setItem("vd_cases",JSON.stringify(u));}catch{};};
  const updateCase=async(id,updates)=>{const c=await api(`/api/cases/${id}`,{method:"PATCH",body:updates});setCases(prev=>prev.map(x=>x.id===id?c:x));};
  const deleteCase=async id=>{await api(`/api/cases/${id}`,{method:"DELETE"});setCases(prev=>prev.filter(c=>c.id!==id));};
  const updateProfile=async updates=>{const p=await api("/api/profile",{method:"PATCH",body:updates});setProfile(p);};
  const toggleDark=()=>{setDark(p=>{const n=!p;saveTheme(n);return n;});};
  const go=id=>{setPage(id);setSideOpen(false);};
