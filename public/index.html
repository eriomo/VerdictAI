// ── Persist ───────────────────────────────────────────────────────────────────
function usePersist(key,initial){
  const [val,setVal]=useState(()=>{
    try{const s=localStorage.getItem('vd_p_'+key);if(s!==null)return JSON.parse(s);}catch{}
    return initial;
  });
  const ref=useRef(val);ref.current=val;
  const set=(updater)=>{
    const next=typeof updater==='function'?updater(ref.current):updater;
    ref.current=next;setVal(next);
    try{localStorage.setItem('vd_p_'+key,JSON.stringify(next));}catch{}
  };
  return [val,set];
}
function clearPersist(...keys){keys.forEach(k=>{try{localStorage.removeItem('vd_p_'+k);}catch{}});}
function clearAllPageStates(){try{Object.keys(localStorage).filter(k=>k.startsWith('vd_p_')).forEach(k=>localStorage.removeItem(k));}catch{}}

async function api(path,opts={}){

// ── Stream ────────────────────────────────────────────────────────────────────
async function stream(sys,user,cb,retries=0){
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${session?.access_token||""}`},body:JSON.stringify({system:sys,user})});
    if(res.status===403){const e=await res.json();throw new Error(e.error==="FREE_LIMIT_REACHED"?"FREE_LIMIT_REACHED":e.message||"Access denied");}
    if(res.status===429&&retries<3){cb("[Busy — retrying...]\n");await new Promise(r=>setTimeout(r,5000));return stream(sys,user,cb,retries+1);}
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`Error ${res.status}`);}
    const reader=res.body.getReader();const dec=new TextDecoder();let full="";
    while(true){
      const {done,value}=await reader.read();if(done)break;
      for(const line of dec.decode(value).split("\n")){
        if(!line.startsWith("data: "))continue;
        const d=line.slice(6);if(d==="[DONE]")continue;
        try{const delta=JSON.parse(d).choices[0]?.delta?.content||"";full+=delta;cb(full);}catch{}
      }
    }
    return full;
  }catch(err){
    if(retries<2&&err.message.includes("fetch")){await new Promise(r=>setTimeout(r,3000));return stream(sys,user,cb,retries+1);}
    throw err;
  }
}

// ── File extraction ───────────────────────────────────────────────────────────
async function extractFile(file){
  const ext=file.name.split(".").pop().toLowerCase();
  if(ext==="pdf"){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try{
          pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
          const pdf=await pdfjsLib.getDocument({data:e.target.result}).promise;
          let text="";
          for(let i=1;i<=Math.min(pdf.numPages,50);i++){const pg=await pdf.getPage(i);const ct=await pg.getTextContent();text+=ct.items.map(x=>x.str).join(" ")+"\n\n";}
          res(text.trim());
        }catch(err){rej(err);}
      };
      r.readAsArrayBuffer(file);
    });
  }
  if(ext==="docx"||ext==="doc"){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try{
          if(window.mammoth&&ext==="docx"){const result=await mammoth.extractRawText({arrayBuffer:e.target.result});if(result.value&&result.value.trim().length>20){res(result.value.trim());return;}}
          const decoder=new TextDecoder("utf-8",{fatal:false});
          const text=decoder.decode(e.target.result);
          const clean=text.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f\x7f-\x9f]/g,"").replace(/[^\x20-\x7e\n\r\t\u00A0-\uFFFF]/g,"").replace(/\s{4,}/g,"\n\n").trim();
          if(clean.length>50)res(clean);
          else rej(new Error("Could not extract readable text. Please paste the text directly."));
        }catch(err){rej(err);}
      };
      r.readAsArrayBuffer(file);
    });
  }
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file,"UTF-8");});
}

// ── Exports ───────────────────────────────────────────────────────────────────
function exportPDF(text,filename="verdict-ai"){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const m=20,pw=doc.internal.pageSize.getWidth()-m*2,lh=7;
  doc.setFillColor(12,26,46);doc.rect(0,0,doc.internal.pageSize.getWidth(),20,"F");
  doc.setTextColor(200,164,94);doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("VERDICT AI",m,13);
  doc.setTextColor(240,237,230);doc.setFontSize(9);doc.setFont("helvetica","normal");doc.text("From documents to decisions.",80,13);
  let y=30;doc.setTextColor(30,30,30);doc.setFontSize(10);
  doc.splitTextToSize(text,pw).forEach(line=>{
    if(y>doc.internal.pageSize.getHeight()-m){doc.addPage();y=m;}
    if(/^[A-Z][A-Z\s]{3,}:/.test(line.trim())){doc.setFont("helvetica","bold");doc.setTextColor(12,26,46);}
    else{doc.setFont("helvetica","normal");doc.setTextColor(30,30,30);}
    doc.text(line,m,y);y+=lh;
  });
  const pg=doc.internal.getNumberOfPages();
  for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150);doc.text(`Verdict AI — Page ${i} of ${pg}`,m,doc.internal.pageSize.getHeight()-10);}
  doc.save(`${filename}.pdf`);
}

OUTCOME SCENARIOS: State the strong win scenario, the probability, and the financial outcome in naira. State the partial win scenario, the probability, and the financial outcome. State the loss scenario, the probability, and the financial cost. All three probabilities must sum to 100%.

FINANCIAL EXPOSURE: The realistic naira range the client can recover or is liable for. Litigation cost estimate.

STRATEGIC ROADMAP: Step-by-step litigation strategy from today to judgment including interim applications, evidence, and settlement windows.

SETTLEMENT RANGE: Optimal settlement in naira. Opening position. Target position. What to hold firm on.`},

opposing:{id:"opposing",title:"Opposing Counsel Simulator",desc:"The strongest counter-arguments your opponent will make — ranked by danger, with defeating strategies.",lbl:"Your Legal Argument",ph:"State your position, supporting facts, legal basis, and any verified authorities...",rows:12,sys:VOICE+`

VULNERABILITY RATING: Rate overall vulnerability from 0 to 10. One full paragraph explaining exactly why.

KILLER ARGUMENTS AGAINST YOU (RANKED BY DANGER): For each argument: rate it CRITICAL, HIGH, or MEDIUM. State the precise legal or factual basis. Explain exactly how much damage it causes. Provide the specific counter-strategy to defeat it.

FATAL GAPS IN YOUR CASE: Facts not proven. Legal elements not established. Procedural steps missed. State each gap and its consequence.

OPENING SENTENCES: Draft the three most devastating sentences opposing counsel will open with. Specific to this case. Written as a skilled silk would actually open. After each sentence, state in one paragraph exactly how to answer it.

CROSS-EXAMINATION TARGETS: Which specific witnesses or documents are most vulnerable and exactly what line of attack will be taken against each one.

PRELIMINARY OBJECTIONS: Only objections that arise from the facts and documents provided. Ranked by likelihood of success. If no arbitration clause appears in the documents, do not invent one. Do not raise any objection not supported by the facts provided.

STEPS TO STRENGTHEN: Specific numbered actionable steps to close each gap before the hearing.`},

strength:{id:"strength",title:"Strength Assessment",desc:"Weighted probability score 0-100% with factor breakdown, outcome matrix, and how to push to 80-90%.",lbl:"Legal Position",ph:"Describe the claim or defence, facts, jurisdiction, applicable law...",rows:12,sys:VOICE+`

OVERALL STRENGTH SCORE: State the percentage. In the very next sentence state the single factor most responsible for the score and the single factor most limiting it.

WEIGHTED FACTOR BREAKDOWN: Score each factor out of 10 with a full paragraph: legal foundation strength, evidence quality, contract clarity, burden of proof, procedural compliance, opposing counter-strength. Show the weighted calculation: (0.20 x each of first four) + (0.10 x each of last two) = total percentage. Always write weights as decimals: 0.20 not 020.

KILLER POINTS: The arguments that win or lose this case. Write in the voice of a closing submission — forceful and specific to these facts. For each: "Even if [opponent argues X], it fails because [specific reason from facts]." Close each with one sentence telling the court what it must find.

OUTCOME PROBABILITY MATRIX: Strong win: probability and financial outcome in naira. Partial win: probability and financial outcome. Loss: probability and financial cost. All three must sum to 100%.

HOW TO PUSH THIS TO 80 TO 90 PERCENT: Numbered steps, each specific and actionable. Generic advice is not acceptable.`},

briefscore:{id:"briefscore",title:"Brief-to-Win Score",desc:"Your brief graded on five dimensions with grammar audit, rewritten sections, and filing recommendation.",lbl:"Legal Brief",ph:"Paste your complete legal brief here...",rows:14,sys:VOICE+`

OVERALL SCORE: State the score out of 100 and the letter grade from A to F. State in one sentence whether this brief is ready to file.

DIMENSION SCORES — each out of 20 with a full paragraph explanation:
1. ARGUMENT STRENGTH: Are arguments legally sound, compelling, correctly ranked.
2. CITATION QUALITY: Are authorities properly applied. Flag any needing PrimsCol verification.
3. LOGICAL FLOW: Does the argument build correctly and where does it lose the reader.
4. PERSUASION AND PRECISION: Is the language sharp and court-grade or vague and generic.
5. TECHNICAL ACCURACY: Procedural compliance, proper headings, correct relief formulation.

KILLER POINTS IN THIS BRIEF: The three strongest arguments and what makes them work.

FATAL WEAKNESSES: Every passage that could cause a judge to dismiss or discount the argument. Quote the specific lines from the brief exactly.

GRAMMAR AUDIT: Quote every sentence with a grammar error or unprofessional phrasing. Write the corrected version after each.

REWRITTEN SECTIONS: Produce the complete rewritten text in full for every defective section. Sound like a senior litigator under pressure — forceful, precise, court-grade. Every rewritten paragraph must be stronger than the original.

FILING RECOMMENDATION: State clearly whether the brief should be filed as is, revised before filing, or substantially redrafted, with the specific reason.`},

courtpredictor:{id:"courtpredictor",title:"Court Success Predictor",desc:"Weighted probability with factor scores, defendant's win path, outcome scenarios, financial figures, and negotiation pressure analysis.",lbl:"Case Details",ph:"Describe the claim, relief sought, court, key facts, and any verified authorities...",rows:10,sys:VOICE+`

SUCCESS PROBABILITY: State overall probability as a percentage. Then break it down: Liability probability — the chance the court finds liability, with the key driver. Damages probability — the chance of recovering the full amount, with the key driver. Risk factors — rate each HIGH, MEDIUM, or LOW with one sentence each.

WEIGHTED FACTOR ANALYSIS: Score each factor out of 10 and write a full explanatory paragraph for each: breach or liability strength, evidence quality, contract or document clarity, termination or procedural validity, damages quantification strength, opposing party defence strength. Then derive the final weighted probability and show the calculation explicitly.

FORUM: The appropriate court for this claim. If the user's documents do not explicitly contain an arbitration clause, the forum is the relevant Nigerian court — never invent arbitration. Only identify arbitration if the exact clause is quoted in the user's input.

DEFENDANT'S WIN PATH: Explain in full paragraphs exactly how the defendant wins this case. The specific arguments that could reduce the claimant's probability to below 40 percent. Do not soften this analysis.

OUTCOME SCENARIOS: Strong win: probability, what the court awards, financial range in naira. Partial win: probability, what is awarded, financial range. Loss: probability, what the claimant faces including cost orders. All three probabilities must sum to 100%.

RISK ALERTS: The two or three things that could collapse this case if not addressed before the hearing. Each stated as a full paragraph.

RECOMMENDATIONS: Numbered steps, each specific and actionable, to increase the probability score.

SETTLEMENT PRESSURE: At what point does settlement become more rational than litigation for each party. Target settlement range in naira based on the probability and financial exposure.`},

explainer:{id:"explainer",title:"Client Explainer",desc:"Turn any legal analysis into a plain English client letter.",lbl:"Legal Text",ph:"Paste the document or analysis to explain to your client...",rows:12,sys:VOICE+`

WHAT THIS DOCUMENT DOES: One paragraph. No legal jargon. State what the document is, who it involves, and what it sets out to do.

WHAT THIS MEANS FOR YOU SPECIFICALLY: The practical consequences for this client. What changes in their life or business. Be concrete and specific.

THREE KEY THINGS: The most important points a non-lawyer cannot miss. Written simply in plain English.

YOUR OBLIGATIONS AND DEADLINES: Every obligation the client must perform, when, and what happens if they do not comply. Written as plain prose.

THE RISKS YOU ARE TAKING ON: Every significant risk in plain language. What the worst case looks like financially.

WHAT YOU SHOULD DO NOW: Numbered specific instructions written as if speaking directly to the client.

Close the letter formally with an invitation to contact the office and a reminder that this letter does not substitute for tailored legal advice.`},

clausedna:{id:"clausedna",title:"Clause DNA",isNew:true,desc:"Complete forensic breakdown — risk scores, party bias, hidden traps, enforceability, and suggested rewrite.",lbl:"Contract Clause",ph:"Paste any single contract clause here...",rows:8,sys:VOICE+`

CLAUSE TYPE: Type, standard name, purpose, which party proposes it. State whether employment or commercial — enforceability threshold differs.

STANDARDNESS RATING: How standard is this clause as a percentage compared to Nigerian market practice. State specifically what deviates from the market standard and why each deviation matters.

RISK SCORE: Rate the risk to each party out of 10. State which party bears more risk and precisely why. Explain the asymmetry in full.

PARTY BIAS: Quote the specific language that favours each party and explain the advantage each phrase creates.

HIDDEN TRAPS: Provisions that appear reasonable but are dangerous. Undefined terms that will be disputed. Omissions that leave a party exposed. Each explained fully.

ENFORCEABILITY: Is this clause enforceable as drafted under Nigerian law. State provisions that may be void. Note: a self-serving reasonableness acknowledgement within the clause does not prevent the court from independently assessing it.

MISSING PROTECTIONS: Every carve-out, limitation, or protective provision that a well-advised party would insist on. Include whether a compensation or garden leave payment is required to make a restrictive covenant enforceable.

NEGOTIATION STRATEGY: Specific tactical advice for each side. What to insist on. What to concede. What is a red line. The exact alternative wording to propose.

SUGGESTED REWRITE: Produce the complete revised clause ready to paste into the contract. CRITICAL NEGATION CHECK: If the original contains "shall not," "must not," "may not," "does not" — these MUST appear in the rewrite. Dropping a negation word reverses the meaning entirely. After drafting each sentence, verify the negation is present before moving on.`},

deadlines:{id:"deadlines",title:"Deadline Intelligence",isNew:true,desc:"Every deadline — explicit and hidden — with risk ratings, consequences, and a compliance calendar.",lbl:"Legal Document",ph:"Paste any legal document — contracts, court orders, filings...",rows:12,sys:VOICE+`

For each deadline identified, state: the exact deadline or trigger event, the specific obligation that arises, the clause reference, the consequence of missing it rated as CRITICAL, HIGH, MEDIUM, or LOW, whether it is a hard deadline or extendable, and any notice requirements. Write URGENT ATTENTION REQUIRED before every CRITICAL deadline. Write all of this in full sentences as prose.

HIDDEN AND IMPLIED DEADLINES: Deadlines not explicitly stated but implied by Nigerian law, court rules, or industry practice. State the basis for each implied deadline.

DEADLINE INTERACTION ANALYSIS: How the deadlines in this document interact. Cascading deadlines. Deadlines that are prerequisites to other rights.

TIME CALCULATION RULES: How to count time under Nigerian law. Public holiday exclusions. Court rule time periods. Statutory extensions available.

COMPLIANCE CALENDAR: All deadlines organised from most urgent to least urgent with a one-line action item for each.

TOP THREE RISK ALERTS: The three deadlines most likely to be missed and the consequence of each, in order of severity.`},

digest:{id:"digest",title:"Case Digest Builder",isNew:true,desc:"Transform any Nigerian judgment into a publication-quality digest — ratio, obiter, critical analysis, practice implications.",lbl:"Judgment Text",ph:"Paste the full text of any Nigerian judgment...",rows:14,sys:VOICE+`

CASE PARTICULARS: Full citation exactly as it appears in the judgment. Court. Coram. Date of judgment. Counsel for each party.

FACTS OF THE CASE: Material facts in numbered paragraphs. What happened. What led to the dispute. What each party claimed.

ISSUES FOR DETERMINATION: Every legal question the court had to decide. Numbered. Each stated precisely in one sentence.

DECISION ON EACH ISSUE: The court's ruling on each issue and the full reasoning. Quote significant passages from the judgment. Explain the reasoning chain in full.

RATIO DECIDENDI: The binding legal principle from this case stated as a precise proposition of law. Every word matters.

OBITER DICTA: Non-binding observations worth noting. Their significance and whether they suggest where the law may develop.

STATUTORY PROVISIONS APPLIED: Full names and sections of all Acts as they appear in the judgment. How the court interpreted each provision.

CASES REFERRED TO: All cases cited in the judgment. For each: the principle for which it was cited and whether followed, distinguished, or overruled.

CRITICAL ANALYSIS: Is the decision well-reasoned. Are there weaknesses in the court's logic. Is it likely to be followed or distinguished in future cases.

IMPLICATIONS FOR PRACTICE: Precisely how a practitioner should use this case. In what arguments. Against what facts. What this case does not decide.`},

legalmemo:{id:"legalmemo",title:"Legal Research Memo",isNew:true,desc:"Partner-quality research memorandum with full analysis, risk matrix, killer insight, and strategic recommendations.",lbl:"Research Brief",ph:"State the question, client situation, key facts, jurisdiction, and any verified authorities...",rows:12,sys:VOICE+`

QUESTION PRESENTED: The precise legal question in one sentence. No ambiguity.

BRIEF ANSWER: Direct answer in two sentences maximum. State the conclusion before the analysis.

EXECUTIVE SUMMARY: Three paragraphs maximum. The core legal position, the key risk, and the recommended action.

RELEVANT FACTS: The legally relevant facts only.

DISCUSSION: Full legal analysis issue by issue. For each issue: the applicable Nigerian statute by full name and section, or the applicable common law principle by its correct name, how it applies to these facts, what it means for the client, and what complications arise. If the user has provided verified authorities, apply them directly and specifically. Do not invent authorities.

KILLER INSIGHT: The one point most lawyers miss. The nuance that changes the advice.

RISK MATRIX: For each risk: probability rated High, Medium, or Low, the severity if it materialises, and the mitigation available. All written in prose.

CONCLUSION: Clear, direct answer to the question presented.

RECOMMENDATIONS: Numbered, specific actions. Prioritised by urgency.

AUTHORITIES NOTE: All statutes referenced by full name. Advise verification of any case authorities on PrimsCol.`},

pleadingcheck:{id:"pleadingcheck",title:"Pleadings Checker",isNew:true,desc:"Every defect found before your opponent does — grammar audit, rewritten sections, filing recommendation.",lbl:"Court Process",ph:"Paste your statement of claim, writ, motion, affidavit, or any court process...",rows:14,sys:VOICE+`

DOCUMENT IDENTIFICATION: Type, court, parties, whether properly headed, whether the relief is properly formulated.

OVERALL QUALITY RATING: Rate this process out of 10. State whether it is ready to file.

FORMAL REQUIREMENTS AUDIT: Check every formal requirement for this type of process under Nigerian court rules. For each requirement: whether it is satisfied, the rule checked, and any deficiency. Write this as full prose paragraphs.

DEFECTS IDENTIFIED: For each defect: the exact defect, the rule or law violated, whether it is FATAL or AMENDABLE, and the precise amendment needed. Number each defect and write it as a full paragraph.

GRAMMAR AUDIT: Quote every sentence containing a grammar error or unprofessional phrasing. After each quoted sentence write the corrected version.

PRELIMINARY OBJECTIONS: Every objection opposing counsel will raise, ranked by likelihood of success. For each: their full argument and the precise counter-argument.

MISSING ELEMENTS: Required elements entirely absent from the document.

REWRITTEN SECTIONS: Produce the actual rewritten text in full for every defective section. Do not describe what should be rewritten — produce it.

FILING RECOMMENDATION: State clearly whether the process should be filed as is, requires minor amendment, or requires substantial redraft, with the specific reason.`},

compliancecal:{id:"compliancecal",title:"Compliance Calendar",isNew:true,desc:"Full annual compliance calendar — every deadline, penalty, responsible officer, and risk alert.",lbl:"Company Details",ph:"Describe the company: type, industry, size, states of operation, licences held, financial year end...",rows:8,sys:VOICE+`

COMPANY COMPLIANCE PROFILE: Summarise the company's key compliance obligations based on the details provided.

CAMA 2020 OBLIGATIONS: Every obligation under the Companies and Allied Matters Act 2020 with the exact deadline, the section of the Act, the responsible officer, and the penalty for non-compliance. Written in full prose paragraphs.

FEDERAL TAX OBLIGATIONS: Every Federal Inland Revenue Service filing — Company Income Tax, Withholding Tax, Value Added Tax, Pay As You Earn, Education Tax, Tertiary Education Tax — with exact filing dates, payment dates, applicable rates, and late filing penalties.

STATE TAX OBLIGATIONS: State-specific taxes for each state of operation with deadlines and rates.

SECTOR REGULATORY OBLIGATIONS: Industry-specific filings, licence renewals, and regulatory submissions with deadlines and the relevant regulatory body.

LABOUR AND EMPLOYMENT OBLIGATIONS: Industrial Training Fund levy, Nigeria Social Insurance Trust Fund contributions, pension fund remittance, group life insurance — each with deadlines and penalties.

PENALTY EXPOSURE SUMMARY: The five most commonly missed obligations ranked by penalty severity. Total potential penalty exposure if all five are missed simultaneously.

MONTHLY CALENDAR: All obligations listed month by month from January to December with the responsible officer for each.

IMMEDIATE ACTION ITEMS: What must be done within the next 30 days. Numbered and specific.`},

clientreport:{id:"clientreport",title:"Client Report Generator",isNew:true,desc:"Describe what happened in court — get a complete, professional client update letter.",lbl:"What Happened Today",ph:"e.g. Appeared before Justice Adeyemi in FHC Lagos. Matter adjourned to 15 April. Defendant filed counter-affidavit...",rows:9,sys:VOICE+`

Draft a formal client update letter. Open with: Dear [Client Name]. Re: [Matter Title] — Court Update [Date].

WHAT HAPPENED: A precise, non-technical account of exactly what occurred. Who was present. What was said or decided. What documents were filed or received.

WHAT THIS MEANS FOR YOUR MATTER: The significance of what happened. Whether it is positive, negative, or neutral for the client's position. Be direct and honest.

WHAT THE OTHER SIDE DID: Anything the opposing party filed, said, or did that the client should know about.

NEXT HEARING AND WHAT TO EXPECT: The next date. What is scheduled to happen. What the court has ordered. What we expect.

ACTION REQUIRED FROM YOU: Every specific instruction to the client with a specific deadline against each item.

OUR ASSESSMENT: A frank assessment of where the matter stands. Are we in a strong or weak position. Is the trajectory favourable.

Close formally with contact details and an invitation to call with questions.`},

feenote:{id:"feenote",title:"Fee Note Builder",isNew:true,desc:"Complete, professional fee note aligned with NBA Remuneration Rules — ready to send.",lbl:"Work Done",ph:"Describe the legal work: matter type, court appearances, documents drafted, time spent, complexity...",rows:9,sys:VOICE+`

Produce a complete, professional fee note ready to send. Draft every section in full.

Begin with: [Firm Letterhead]. Date: [Date]. Fee Note No.: [Number]. To: [Client Name and Address]. Re: Professional Charges — [Matter Description].

INTRODUCTION: One formal sentence recording that these charges cover the period and work described.

ITEMISED PROFESSIONAL CHARGES: For each item of work: a complete description of the work done, the applicable Nigerian Bar Association Remuneration Rules scale or time-based basis, and the charge amount. Produce a minimum of six substantive items.

DISBURSEMENTS: All out-of-pocket costs incurred with amounts.

SUBTOTAL: Total professional fees before VAT. VAT AT 7.5 PERCENT: The VAT amount in naira. TOTAL DUE: The total in figures and in words.

PAYMENT TERMS: Payment due date. Bank details placeholder. Consequences of late payment.

CLOSING NOTE: These charges are rendered in accordance with the Legal Practitioners Act and the Nigerian Bar Association Remuneration Rules. Queries to be raised within 14 days of the date of this fee note.`},

intakememo:{id:"intakememo",title:"Client Intake Memo",isNew:true,desc:"Rough notes turned into a complete intake memo — causes of action, risk alerts, strategy, fee estimate.",lbl:"Client Situation (Rough Notes)",ph:"e.g. New client. Landlord-tenant dispute. Landlord served quit notice claiming rent arrears...",rows:10,sys:VOICE+`

Produce a complete, senior-associate quality client intake memorandum. Head it: CLIENT INTAKE MEMORANDUM — CONFIDENTIAL.

FACTS AS PRESENTED: Organised narrative of the client's instructions in numbered paragraphs. Identify what is known and what requires verification.

LEGAL ISSUES IDENTIFIED: Every cause of action or defence arising from these facts. For each: the legal basis, the applicable Nigerian statute by full name or common law principle by correct name, the elements that must be proven, and a preliminary strength assessment from 1 to 10.

CRITICAL DOCUMENTS TO OBTAIN: Every document that must be obtained before the matter can be properly advised. Priority-ranked.

LIMITATION ANALYSIS: The applicable limitation period. Whether urgent action is required. The consequence of delay.

RISK ALERTS: The specific risks the client must be warned about immediately.

PRELIMINARY STRATEGY: The recommended approach — litigation, negotiation, or ADR. Why. The likely timeline.

FEE ESTIMATE: Preliminary estimate of professional charges broken down by stage.

IMMEDIATE ACTIONS — NEXT 7 DAYS: Exactly what the lawyer must do this week. Numbered.`},

statute:{id:"statute",title:"Statute Explainer",isNew:true,desc:"Paste any Nigerian statutory provision — get the text, meaning, judicial approach, traps, and practical implications.",lbl:"Statutory Section",ph:"e.g. Section 84 Evidence Act 2011, or paste the full text of the provision...",rows:7,sys:VOICE+`

STATUTE IDENTIFICATION: Full name of the Act, section number and subsections, when it came into force, and any amendments.

FULL TEXT: The exact text of the provision as enacted.

PLAIN ENGLISH MEANING: What this section means in plain language. Who it applies to. What it requires, prohibits, or enables.

LEGISLATIVE PURPOSE: Why this provision was enacted. The mischief it was designed to address.

JUDICIAL APPROACH: How Nigerian courts have approached this provision. The key principles of interpretation applied. The established meaning of key terms.

ARGUMENTS FOR AND AGAINST APPLICATION: The strongest legal arguments on each side in contested cases.

COMMON MISTAKES: How lawyers and parties typically misapply or misunderstand this provision.

KILLER INSIGHT: The nuance most lawyers miss. The trap. The opportunity.

PRACTICAL IMPLICATIONS: Exactly what a lawyer must know when advising a client on this provision.

RELATED PROVISIONS: Other sections of the same Act or other Acts that interact with, qualify, or expand this provision.`},

precedent:{id:"precedent",title:"Precedent Clause Library",isNew:true,desc:"Describe the clause you need — three court-ready versions with drafting notes and negotiation guide.",lbl:"Clause Description",ph:"e.g. Limitation of liability clause for a SaaS agreement. Vendor is Nigerian startup. Customer is a large bank...",rows:8,sys:VOICE+`

CLAUSE IDENTIFICATION: Type, purpose, what risk it allocates, and which party typically proposes it.

MARKET POSITION: What is standard practice for this clause in Nigeria. How far the request deviates from market standard and why it matters.

VERSION 1 — MARKET STANDARD: The complete clause as it appears in a balanced Nigerian commercial contract. Include all defined terms and standard carve-outs. Every word must be present.

VERSION 2 — AGGRESSIVE — MAXIMISES YOUR CLIENT'S PROTECTION: The complete clause with maximum protection. After the clause text identify every provision that makes it aggressive and what pushback to expect.

VERSION 3 — CONCILIATORY — DESIGNED TO GET SIGNED: The complete clause with minimum friction. After the clause text identify every compromise made and what the client gives up.

ENFORCEABILITY NOTE: Any provisions in any version that may be void or unenforceable under Nigerian law.

DRAFTING NOTES: Defined terms needed. Cross-references to include. Key drafting considerations for each version.

NEGOTIATION GUIDE: Opening position. First concession. What to hold firm on. The dealbreaker. The specific fallback language to propose.`},

correspondence:{id:"correspondence",title:"Correspondence Tracker",isNew:true,desc:"Paste any letter received — demand analysis, legal consequences, exposure assessment, complete draft reply.",lbl:"Letter Received",ph:"Paste the full text of any letter, demand notice, or legal correspondence...",rows:12,sys:VOICE+`

LETTER IDENTIFICATION: Sender, letter type, date, and the legal significance of this type of correspondence.

WHAT THEY ARE DEMANDING: Every specific demand or request in full. Nothing summarised or softened.

DEADLINE ANALYSIS: The explicit deadline stated. If none is stated, the implied deadline under Nigerian law or practice and the precise legal basis for that implied deadline.

LEGAL CONSEQUENCES: Exactly what happens legally if not responded to. What rights they acquire. What proceedings they can commence.

STRENGTH OF THEIR POSITION: Is this letter legally sound. Where are they overreaching. What are the weaknesses in their position.

EXPOSURE ASSESSMENT: The realistic financial and legal exposure in naira if their demands are valid.

RECOMMENDED STRATEGY: Whether to respond fully, partially, challenge, seek more time, or make a without-prejudice proposal. The specific reasoning.

DRAFT REPLY LETTER: A complete, formal reply letter that addresses every point in their correspondence, protects the client's position, makes no unnecessary admissions, and positions the client optimally for what comes next. The letter must be properly dated and formatted and ready to send.`},

function ReaderPage({onSave,t,go}){
  const [txt,setTxt]=usePersist("reader_txt","");
  const [out,setOut]=usePersist("reader_out","");
  const [loading,setLoading]=useState(false);
  const [fileName,setFileName]=usePersist("reader_fn","");
  const [limitReached,setLimitReached]=useState(false);
  const {setLastAnalysis}=useSess();
  const sys=VOICE+`

DOCUMENT IDENTIFICATION: Document type, parties, governing law, date, and the single most important thing to know about this document in one sentence.

EXECUTIVE RISK RATING: Rate the overall risk to the client as HIGH, MEDIUM, or LOW. State in one full paragraph what drives that rating.

CRITICAL CLAUSES: For each significant clause: what it says, what it actually means in practice, which party it favours, and the specific risk or benefit it creates. Flag every clause that is unusual, one-sided, or potentially unenforceable under Nigerian law.

RISK FLAGS: For each risk: rate it CRITICAL, HIGH, or MEDIUM. State the exact clause or absence of clause. Explain what happens if the risk materialises — specifically and bluntly. State the financial or legal exposure in naira. Then state in one sentence what the client must do about it before signing. Do not soften risk flags. If a clause is dangerous, say it is dangerous.

HIDDEN RISKS: Clauses that appear standard but contain hidden traps. Undefined terms that will cause disputes. Gaps that leave the client exposed.

OBLIGATIONS: Every obligation the client must perform, the deadline or trigger, the consequence of breach, and whether the obligation is reasonable.

NEGOTIATION POINTS: The specific changes the client must push for, ranked by importance. For each: what to ask for, what to accept as a compromise, and what is a dealbreaker.

PLAIN ENGLISH SUMMARY: What this document does, what it commits the client to, and the three most important things they must understand.

NEXT STEPS: Numbered specific actions before signing. Every step is concrete — exactly what to do, not just to consider something. Do not say "seek legal advice" — this IS the legal advice. The final step must state clearly: sign, negotiate, or reject — and why.`;
  const run=async()=>{
    if(!txt.trim())return;setLoading(true);setOut("");setLimitReached(false);
    try{const res=await stream(sys,txt,s=>setOut(s));await onSave({name:(fileName||"Document")+" — "+new Date().toLocaleDateString(),content:txt.slice(0,400)+"...",analysis:res,type:"analyzed"});setLastAnalysis({title:fileName||"Document Analysis",text:res});}
    catch(e){if(e.message==="FREE_LIMIT_REACHED")setLimitReached(true);else setOut("Error: "+e.message);}
    setLoading(false);
  };
  const doClear=()=>{setTxt("");setOut("");setFileName("");clearPersist("reader_txt","reader_out","reader_fn");};
  return React.createElement("div",{className:"fade"},
    React.createElement(Hdr,{title:"Document Analysis",desc:"Upload any legal document for complete AI analysis — risk rating, hidden traps, and killer negotiation points.",t,onClear:doClear,hasContent:!!(txt||out)}),
    limitReached&&React.createElement(UpgradeBanner,{t,go}),
    React.createElement(Two,{

  useEffect(()=>{const ping=async()=>{try{await fetch("/api/health");}catch{}};ping();const iv=setInterval(ping,10*60*1000);return()=>clearInterval(iv);},[]);

  useEffect(()=>{
    if(!user)return;
    // Check if returning from a payment
    const pendingRef=sessionStorage.getItem("vd_pay_ref");
    const pendingPlan=sessionStorage.getItem("vd_pay_plan");
    if(pendingRef&&pendingPlan){
      sessionStorage.removeItem("vd_pay_ref");
      sessionStorage.removeItem("vd_pay_plan");
      sb.auth.getSession().then(({data:{session}})=>{
        if(!session?.access_token)return;
        setTimeout(async()=>{
          try{
            const vRes=await fetch(`/api/payments/verify/${pendingRef}`,{headers:{"Authorization":`Bearer ${session.access_token}`}});
            const vData=await vRes.json();
            if(vData.success){
              setProfile(p=>({...p,tier:vData.tier}));
              setPage("dashboard");
            }
          }catch(e){console.log("Pending payment check error:",e.message);}
        },2000);
      });
    }
    try{const cd=sessionStorage.getItem("vd_docs");const cc=sessionStorage.getItem("vd_cases");const cp=sessionStorage.getItem("vd_profile");if(cd)setDocs(JSON.parse(cd));if(cc)setCases(JSON.parse(cc));if(cp)setProfile(JSON.parse(cp));}catch{}
    loadAll(true);
  },[user]);

  const loadAll=async(silent=false)=>{
    if(!silent)setDataLoading(true);
    try{
      const [d,c,p]=await Promise.all([api("/api/documents").catch(()=>[]),api("/api/cases").catch(()=>[]),api("/api/profile").catch(()=>null)]);
      const nd=Array.isArray(d)?d:[];const nc=Array.isArray(c)?c:[];
      setDocs(nd);setCases(nc);setProfile(p);
      try{sessionStorage.setItem("vd_docs",JSON.stringify(nd));sessionStorage.setItem("vd_cases",JSON.stringify(nc));sessionStorage.setItem("vd_profile",JSON.stringify(p));}catch{}
    }catch(e){console.log("Load error:",e.message);}
    if(!silent)setDataLoading(false);
  };

  const saveDoc=async doc=>{try{const d=await api("/api/documents",{method:"POST",body:doc});const u=[d,...docs];setDocs(u);try{sessionStorage.setItem("vd_docs",JSON.stringify(u));}catch{};}catch(e){console.log("Save error:",e.message);}};
  const deleteDoc=async id=>{await api(`/api/documents/${id}`,{method:"DELETE"});const u=docs.filter(d=>d.id!==id);setDocs(u);try{sessionStorage.setItem("vd_docs",JSON.stringify(u));}catch{};};
  const addCase=async data=>{const c=await api("/api/cases",{method:"POST",body:data});const u=[c,...cases];setCases(u);try{sessionStorage.setItem("vd_cases",JSON.stringify(u));}catch{};};
  const updateCase=async(id,updates)=>{const c=await api(`/api/cases/${id}`,{method:"PATCH",body:updates});setCases(prev=>prev.map(x=>x.id===id?c:x));};
  const deleteCase=async id=>{await api(`/api/cases/${id}`,{method:"DELETE"});setCases(prev=>prev.filter(c=>c.id!==id));};
  const updateProfile=async updates=>{const p=await api("/api/profile",{method:"PATCH",body:updates});setProfile(p);};
  const toggleDark=()=>{setDark(p=>{const n=!p;saveTheme(n);return n;});};
  const go=id=>{setPage(id);setSideOpen(false);try{const el=document.querySelector(".content-area");if(el)el.scrollTop=0;}catch{}};

  if(authLoading)return React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#07101c",flexDirection:"column",gap:18}},
    React.createElement("div",{style:{width:58,height:58,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:28,color:"#0D1B2E"}},"V"),
    React.createElement("div",{style:{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:"#F0EDE6"}},"Verdict",React.createElement("span",{style:{color:GOLD}},"AI")),
    React.createElement("div",{style:{display:"flex",gap:8}},[0,1,2].map(i=>React.createElement("div",{key:i,style:{width:8,height:8,borderRadius:"50%",background:GOLD,animation:`vPulse 1.2s ${i*0.2}s infinite ease-in-out`}})))
  );

  if(!user){
    if(showAuth)return React.createElement(AuthPage,{t:theme(true),onBack:()=>setShowAuth(false)});
    return React.createElement(LandingPage,{onGetStarted:()=>setShowAuth(true),t:theme(true)});
  }

  const pageTitle={dashboard:"Dashboard",matterclock:"Matter Clock",reader:"Document Analysis",qa:"Legal Q&A",draft:"Draft Documents",jurisdiction:"Jurisdiction Translator",nigeriancases:"Nigerian Case Law",lawdatabases:"Law Research Hub",vault:"Document Vault",cases:"Case Workspaces",profile:"My Profile",upgrade:"Upgrade Plan",witness:"Witness Forge",evidence:"Evidence Analyser",settlement:"Settlement Intelligence",seniorpartner:"AI Senior Partner",crossexam:"Witness Cross-Examiner",motionammo:"Motion Ammunition",claimanalyser:"Claim Analyser",clientprep:"Client Prep Coach",negotiation:"Contract Negotiation",whatsapp:"WhatsApp Evidence"};

  const tier=profile?.tier||"free";

  const renderPage=()=>{
    if(CHAMBERS_FEATURES.includes(page)&&tier!=="chambers"){
      const names={crossexam:"Witness Cross-Examiner",motionammo:"Motion Ammunition",claimanalyser:"Claim Analyser",clientprep:"Client Prep Coach",witness:"Witness Forge",evidence:"Evidence Analyser",settlement:"Settlement Intelligence",seniorpartner:"AI Senior Partner"};
      return React.createElement(ChambersGate,{t,go,featureName:names[page]||page});
    }
    if(SOLO_LOCKED_FOR_FREE.includes(page)&&tier==="free"){
      const name=AI_CFGS[page]?.title||page.charAt(0).toUpperCase()+page.slice(1);
      return React.createElement(FreeGate,{t,go,featureName:name});
    }
    if(AI_CFGS[page])return React.createElement(AIPage,{cfg:AI_CFGS[page],t,go,pageId:page});
    switch(page){
      case "dashboard": return React.createElement(Dashboard,{go,t,docCount:docs.length,caseCount:cases.length,profile});
      case "reader": return React.createElement(ReaderPage,{onSave:saveDoc,t,go});
      case "qa": return React.createElement(QAPage,{t,go});
      case "draft": return React.createElement(DraftPage,{t,go});
      case "jurisdiction": return React.createElement(JurisdictionPage,{t,go});
      case "nigeriancases": return React.createElement(NigerianCasesPage,{t,go});
      case "lawdatabases": return React.createElement(LawDatabasesPage,{t});
      case "matterclock": return React.createElement(MatterClockPage,{t});
      case "witness": return React.createElement(WitnessPage,{t,go});
      case "evidence": return React.createElement(EvidencePage,{t,go});
      case "settlement": return React.createElement(SettlementPage,{t,go});
      case "negotiation": return React.createElement(NegotiationPage,{t,go});
      case "whatsapp": return React.createElement(WhatsAppPage,{t,go});
      case "seniorpartner": return React.createElement(SeniorPartnerPage,{t,go});
      case "crossexam": return React.createElement(CrossExamPage,{t,go});
      case "motionammo": return React.createElement(MotionAmmoPage,{t,go});
      case "claimanalyser": return React.createElement(ClaimAnalyserPage,{t,go});
      case "clientprep": return React.createElement(ClientPrepPage,{t,go});
      case "vault": return React.createElement(VaultPage,{docs,onDelete:deleteDoc,onRefresh:loadAll,t,go});
      case "cases": return React.createElement(CasesPage,{cases,onAdd:addCase,onUpdate:updateCase,onDelete:deleteCase,t});
      case "profile": return React.createElement(ProfilePage,{profile,onUpdate:updateProfile,t,go});
      case "upgrade": return React.createElement(UpgradePage,{t,go,userTier:tier,userEmail:user?.email,onUpgradeSuccess:(newTier)=>{setProfile(p=>({...p,tier:newTier}));}});
      default: return React.createElement(Dashboard,{go,t,docCount:docs.length,caseCount:cases.length,profile});
    }
  };

  return React.createElement(SessProvider,null,
    React.createElement("div",{className:"app-shell",style:{background:t.bg,color:t.text,transition:"background 0.3s,color 0.3s"}},
      sideOpen&&React.createElement("div",{className:"sidebar-overlay",onClick:()=>setSideOpen(false)}),
      React.createElement("div",{className:"sidebar",style:{background:t.card,borderRight:`1px solid ${t.border}`,transform:sideOpen?"translateX(0)":"translateX(-100%)"}},
        React.createElement("div",{style:{padding:"18px 16px 14px",borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:9}},
            React.createElement("div",{style:{width:32,height:32,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:"#0D1B2E"}},"V"),
            React.createElement("span",{style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:t.text}},"Verdict",React.createElement("span",{style:{color:GOLD}},"AI"))
          ),
          React.createElement("button",{onClick:()=>setSideOpen(false),style:{background:"none",border:"none",color:t.muted,cursor:"pointer",fontSize:22,padding:4,lineHeight:1}},"×")
        ),
        React.createElement("div",{style:{padding:"10px 14px 12px",borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",gap:10,cursor:"pointer"},onClick:()=>go("profile")},
          React.createElement("div",{style:{width:30,height:30,borderRadius:"50%",background:GOLD,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#0D1B2E",flexShrink:0}},(profile?.full_name||user.email||"U")[0].toUpperCase()),
          React.createElement("div",{style:{minWidth:0}},
            React.createElement("div",{style:{fontSize:13,fontWeight:600,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},profile?.full_name||"My Account"),
            React.createElement("div",{style:{fontSize:10,color:GOLD,fontWeight:700}},({"free":"FREE","solo":"SOLO","chambers":"CHAMBERS"}[profile?.tier||"free"]||"FREE")+" PLAN")
          )
        ),
        React.createElement("nav",{style:{flex:1,padding:"8px 6px",overflowY:"auto"}},
          NAV.map(s=>React.createElement("div",{key:s.sec},
            React.createElement("div",{style:{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"1.5px",color:t.muted,padding:"9px 8px 3px"}},s.sec),
            s.items.map(item=>React.createElement("button",{key:item.id,onClick:()=>go(item.id),style:{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 9px",borderRadius:7,border:page===item.id?"1px solid rgba(200,164,94,0.22)":"1px solid transparent",background:page===item.id?"rgba(200,164,94,0.11)":"none",color:page===item.id?GOLD:t.dim,fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:"inherit",marginBottom:1,textAlign:"left",transition:"all 0.12s"}},
              React.createElement("span",{style:{fontSize:14}},item.icon),item.label
            ))
          ))
        ),
        React.createElement("div",{style:{padding:"8px 6px",borderTop:`1px solid ${t.border}`}},
          tier==="free"&&React.createElement("button",{onClick:()=>go("upgrade"),style:{display:"flex",alignItems:"center",justifyContent:"center",width:"100%",padding:"8px",marginBottom:6,borderRadius:7,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,border:"none",color:"#0D1B2E",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},"Upgrade — from NGN 12,000"),
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"4px 8px"}},
            React.createElement("span",null,"☀️"),
            React.createElement("div",{onClick:toggleDark,style:{width:40,height:22,background:dark?"rgba(200,164,94,0.18)":"rgba(0,0,0,0.1)",border:`1px solid ${dark?"rgba(200,164,94,0.3)":t.border}`,borderRadius:100,position:"relative",cursor:"pointer",transition:"all 0.3s"}},
              React.createElement("div",{style:{position:"absolute",top:2,left:dark?18:2,width:16,height:16,background:GOLD,borderRadius:"50%",transition:"left 0.3s"}})
            ),
            React.createElement("span",null,"🌙"),
            React.createElement("span",{style:{fontSize:11,color:t.muted}},dark?"Dark":"Light")
          )
        )
      ),
      React.createElement("div",{className:"app-body"},
        React.createElement("div",{className:"main-col"},
          React.createElement("div",{className:"topbar",style:{background:t.card,borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 12px",gap:8}},
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,minWidth:0,flex:1}},
              React.createElement("button",{onClick:()=>setSideOpen(true),style:{background:"none",border:"none",cursor:"pointer",fontSize:20,color:t.dim,padding:4,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center",minWidth:32,minHeight:32,flexShrink:0}},"☰"),
              React.createElement("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:"clamp(13px,3.5vw,16px)",fontWeight:600,margin:0,color:t.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},AI_CFGS[page]?.title||pageTitle[page]||"Verdict AI")
            ),
            React.createElement("span",{style:{fontSize:10,color:t.muted,fontStyle:"italic",flexShrink:0,display:"var(--tagline-display,inline)"}},"From documents to decisions.")
          ),
          React.createElement("div",{key:page,className:"content-area"},
            dataLoading&&docs.length===0&&cases.length===0&&!profile
              ?React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:200,color:t.muted,fontSize:13,gap:10}},
                  React.createElement("div",{style:{width:18,height:18,border:`2px solid ${GOLD}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}),
                  "Loading..."
                )
              :renderPage()
          )
        )
      )
    )
  );
}

function App(){return React.createElement(AuthProvider,null,React.createElement(AppContent));}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
