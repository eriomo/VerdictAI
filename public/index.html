function usePersist(key,initial){
  const [val,setVal]=useState(()=>{try{const s=localStorage.getItem('vd_p_'+key);if(s!==null)return JSON.parse(s);}catch{}return initial;});
  const ref=useRef(val);ref.current=val;
  const set=(u)=>{const n=typeof u==='function'?u(ref.current):u;ref.current=n;setVal(n);try{localStorage.setItem('vd_p_'+key,JSON.stringify(n));}catch{}};
  return [val,set];
}
function clearPersist(...keys){keys.forEach(k=>{try{localStorage.removeItem('vd_p_'+k);}catch{}});}

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path,opts={}){
  const {data:{session}}=await sb.auth.getSession();
  const token=session?.access_token||"";
  const res=await fetch(path,{...opts,headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`,...(opts.headers||{})},body:opts.body?JSON.stringify(opts.body):undefined});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.message||e.error||"Request failed");}
  return res.json();
}

async function stream(sys,user,cb,retries=0){
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${session?.access_token||""}`},body:JSON.stringify({system:sys,user})});
    if(res.status===403){const e=await res.json();throw new Error(e.error==="FREE_LIMIT_REACHED"?"FREE_LIMIT_REACHED":e.message||"Access denied");}
    if(res.status===429&&retries<3){cb("[Busy — retrying...]\n");await new Promise(r=>setTimeout(r,5000));return stream(sys,user,cb,retries+1);}
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`Error ${res.status}`);}
    const reader=res.body.getReader();const dec=new TextDecoder();let full="";
    while(true){const{done,value}=await reader.read();if(done)break;for(const line of dec.decode(value).split("\n")){if(!line.startsWith("data: "))continue;const d=line.slice(6);if(d==="[DONE]")continue;try{const delta=JSON.parse(d).choices[0]?.delta?.content||"";full+=delta;cb(full);}catch{}}}
    return full;
  }catch(err){
    if(retries<2&&err.message.includes("fetch")){await new Promise(r=>setTimeout(r,3000));return stream(sys,user,cb,retries+1);}
    throw err;
  }
}

// Single-turn AI call (returns full response, no streaming)
async function ask(sys,user){
  return new Promise(async(res,rej)=>{
    let full="";
    try{await stream(sys,user,v=>full=v);res(full);}
    catch(e){rej(e);}
  });
}

// ── File extraction ───────────────────────────────────────────────────────────
async function extractFile(file){
  const ext=file.name.split(".").pop().toLowerCase();
  if(ext==="pdf"){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try{
          pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
          const pdf=await pdfjsLib.getDocument({data:e.target.result}).promise;
          let text="";
          for(let i=1;i<=Math.min(pdf.numPages,50);i++){const pg=await pdf.getPage(i);const ct=await pg.getTextContent();text+=ct.items.map(x=>x.str).join(" ")+"\n\n";}
          res(text.trim());
        }catch(err){rej(err);}
      };
      r.readAsArrayBuffer(file);
    });
  }
  if(ext==="docx"||ext==="doc"){
    return new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=async e=>{
        try{
          if(window.mammoth&&ext==="docx"){const result=await mammoth.extractRawText({arrayBuffer:e.target.result});if(result.value&&result.value.trim().length>20){res(result.value.trim());return;}}
          const decoder=new TextDecoder("utf-8",{fatal:false});const text=decoder.decode(e.target.result);
          const clean=text.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f\x7f-\x9f]/g,"").replace(/[^\x20-\x7e\n\r\t\u00A0-\uFFFF]/g,"").replace(/\s{4,}/g,"\n\n").trim();
          if(clean.length>50)res(clean);else rej(new Error("Could not extract text. Please paste directly."));
        }catch(err){rej(err);}
      };
      r.readAsArrayBuffer(file);
    });
  }
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsText(file,"UTF-8");});
}

function exportPDF(text,filename="verdict-ai"){
  const {jsPDF}=window.jspdf;const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const m=20,pw=doc.internal.pageSize.getWidth()-m*2,lh=7;
  doc.setFillColor(12,26,46);doc.rect(0,0,doc.internal.pageSize.getWidth(),20,"F");
  doc.setTextColor(200,164,94);doc.setFontSize(14);doc.setFont("helvetica","bold");doc.text("VERDICT AI",m,13);
  doc.setTextColor(240,237,230);doc.setFontSize(9);doc.setFont("helvetica","normal");doc.text("From documents to decisions.",80,13);
  let y=30;doc.setTextColor(30,30,30);doc.setFontSize(10);
  doc.splitTextToSize(text,pw).forEach(line=>{if(y>doc.internal.pageSize.getHeight()-m){doc.addPage();y=m;}if(/^[A-Z\s]+:/.test(line.trim())){doc.setFont("helvetica","bold");doc.setTextColor(12,26,46);}else{doc.setFont("helvetica","normal");doc.setTextColor(30,30,30);}doc.text(line,m,y);y+=lh;});
  const pg=doc.internal.getNumberOfPages();for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(150);doc.text(`Verdict AI — Page ${i} of ${pg}`,m,doc.internal.pageSize.getHeight()-10);}
  doc.save(filename+".pdf");
}
async function exportDOCX(text,filename="verdict-ai"){
  try{
    const {Document,Packer,Paragraph,TextRun,BorderStyle}=window.docx;
    const lines=text.split("\n");
    const children=[new Paragraph({children:[new TextRun({text:"VERDICT AI",bold:true,size:28,color:"C8A45E",font:"Calibri"}),new TextRun({text:"   |   From documents to decisions.",size:18,color:"888888",font:"Calibri"})],spacing:{after:200},border:{bottom:{style:BorderStyle.SINGLE,size:6,color:"C8A45E"}}}),new Paragraph({text:"",spacing:{after:100}})];
    lines.forEach(line=>{const t=line.trim();if(!t){children.push(new Paragraph({text:"",spacing:{after:80}}));return;}if(/^[A-Z][A-Z\s]{3,}:/.test(t)){children.push(new Paragraph({children:[new TextRun({text:t,bold:true,size:22,color:"0A1628",font:"Calibri"})],spacing:{before:240,after:80},border:{bottom:{style:BorderStyle.SINGLE,size:3,color:"E0DAD0"}}}));}else{children.push(new Paragraph({children:[new TextRun({text:t,size:20,font:"Calibri",color:"1A1A2E"})],spacing:{after:80}}));}});
    children.push(new Paragraph({children:[new TextRun({text:`Generated by Verdict AI — ${new Date().toLocaleDateString()} — verdictai.onrender.com`,size:16,color:"888888",italics:true,font:"Calibri"})],border:{top:{style:BorderStyle.SINGLE,size:3,color:"E0DAD0"}},spacing:{before:300}}));
    const doc=new Document({creator:"Verdict AI",title:filename,sections:[{properties:{},children}]});
    const blob=await Packer.toBlob(doc);const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename+".docx";a.click();URL.revokeObjectURL(url);
  }catch(err){const b=new Blob([text],{type:"application/msword"});const url=URL.createObjectURL(b);const a=document.createElement("a");a.href=url;a.download=filename+".doc";a.click();}
}
